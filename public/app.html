    <script>
      // Theme toggle
      const savedTheme = localStorage.getItem("theme") || "dark";
      document.documentElement.setAttribute("data-theme", savedTheme);
      const themeBtn = document.getElementById("themeToggle");
      themeBtn.textContent = savedTheme === "dark" ? "☀" : "☾";
      themeBtn.onclick = () => {
        const c = document.documentElement.getAttribute("data-theme");
        const n = c === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", n);
        localStorage.setItem("theme", n);
        themeBtn.textContent = n === "dark" ? "☀" : "☾";
      };

      const UNITS = ["عدد", "م²", "متر طولي", "مقطوع", "ساعة"];
      const SECTION_COLORS = ["#8B5E3C","#C97B63","#D4A017","#6B4A2E","#9B9488","#4C6B63","#55606B","#8A6512"];

      const token = localStorage.getItem("token");
      const currentUser = JSON.parse(localStorage.getItem("user") || "null");
      if (!token || !currentUser) window.location.href = "/index.html";

      async function api(path, options = {}) {
        const res = await fetch("/api" + path, {
          ...options,
          headers: { "Content-Type": "application/json", Authorization: "Bearer " + token, ...(options.headers || {}) },
        });
        if (res.status === 401) {
          localStorage.removeItem("token");
          localStorage.removeItem("user");
          window.location.href = "/index.html";
          throw new Error("unauthorized");
        }
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "صار في خطأ");
        return data;
      }

      let state = {
        projectName: "",
        referenceNo: "",
        clientName: "",
        siteLocation: "",
        taxPct: 16,
        discountVal: 0,
        discountType: "fixed",
        executionDays: 45,
        validityDays: 30,
        paymentTerms: [
          { percentage: 60, trigger_description: "عند توقيع العقد" },
          { percentage: 30, trigger_description: "عند إنجاز 70%" },
          { percentage: 10, trigger_description: "عند التسليم النهائي" },
        ],
      };
      let sections = [];
      let activeSectionIdx = 0;
      let currentQuoteId = null;
      let isOwnerOrAdmin = currentUser.role === "owner" || currentUser.role === "admin";
      let allPickerCategories = [];
      let activeCategoryTab = null;

      function money(n) {
        n = Number.isFinite(n) ? n : 0;
        return n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " د.أ";
      }
      function moneyShort(n) {
        return Number(n || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      function moneyInt(n) {
        n = Number.isFinite(n) ? n : 0;
        return Math.round(n).toLocaleString("en-US") + " د.أ";
      }
      function moneyShortInt(n) {
        return Math.round(Number(n || 0)).toLocaleString("en-US");
      }
      function escapeAttr(s) {
        return (s || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
      }

      function compressImage(file) {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement("canvas");
              const maxDim = 600;
              let w = img.width, h = img.height;
              if (w > maxDim || h > maxDim) {
                if (w > h) { h = Math.round((h / w) * maxDim); w = maxDim; }
                else { w = Math.round((w / h) * maxDim); h = maxDim; }
              }
              canvas.width = w; canvas.height = h;
              canvas.getContext("2d").drawImage(img, 0, 0, w, h);
              resolve(canvas.toDataURL("image/jpeg", 0.7));
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        });
      }

      function openLightbox(src) {
        const lb = document.getElementById("lightbox");
        document.getElementById("lightboxImg").src = src;
        lb.classList.add("open");
      }
      function closeLightbox() {
        const lb = document.getElementById("lightbox");
        lb.classList.remove("open");
        document.getElementById("lightboxImg").src = "";
      }
      document.getElementById("lightbox").onclick = (e) => {
        if (e.target === e.currentTarget || e.target.classList.contains("lightbox-close")) closeLightbox();
      };

      function nextSectionCode() {
        const used = sections.map(s => s.code);
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        for (const l of letters) {
          if (!used.includes(l)) return l;
        }
        return String(used.length + 1);
      }

      // ---- Shared search utilities ----
      function fuzzyMatch(text, query) {
        text = text.toLowerCase();
        query = query.toLowerCase();
        if (text.includes(query)) return true;
        let qi = 0;
        for (let ti = 0; ti < text.length && qi < query.length; ti++) {
          if (text[ti] === query[qi]) qi++;
        }
        return qi === query.length;
      }

      function highlightText(text, query) {
        if (!query) return escapeAttr(text);
        const lower = text.toLowerCase();
        const qLower = query.toLowerCase();
        const idx = lower.indexOf(qLower);
        if (idx >= 0) {
          const before = text.slice(0, idx);
          const match = text.slice(idx, idx + query.length);
          const after = text.slice(idx + query.length);
          return escapeAttr(before) + '<mark>' + escapeAttr(match) + '</mark>' + escapeAttr(after);
        }
        return escapeAttr(text);
      }

      if (!window._itemSearchCache) window._itemSearchCache = {};
      async function fetchCategoryItems(catId) {
        if (window._itemSearchCache[catId]) return window._itemSearchCache[catId];
        try {
          const data = await api(`/price-list/${catId}/items`);
          const items = data.items || [];
          window._itemSearchCache[catId] = items;
          return items;
        } catch {
          return [];
        }
      }

      async function fetchAllCategoryItems() {
        if (window._allItemsCache) return window._allItemsCache;
        if (allPickerCategories.length === 0) {
          try {
            const data = await api("/price-list");
            allPickerCategories = data.categories || [];
          } catch { return []; }
        }
        const results = [];
        for (const cat of allPickerCategories) {
          const items = await fetchCategoryItems(cat.id);
          results.push(...items);
        }
        window._allItemsCache = results;
        return results;
      }

      function invalidateAllItemsCache() { window._allItemsCache = null; }

      // ---- Render Functions ----
      function renderSectionsNav() {
        const nav = document.getElementById("sectionsNav");
        nav.innerHTML = "";
        sections.forEach((sec, idx) => {
          const btn = document.createElement("div");
          btn.className = "section-tab" + (idx === activeSectionIdx ? " active" : "");
          const count = (sec.items || []).length;
          btn.innerHTML = `<span class="chip" style="background:${SECTION_COLORS[idx % SECTION_COLORS.length]};width:12px;height:12px;border-radius:4px;display:inline-block;"></span>${escapeAttr(sec.code)}: ${escapeAttr(sec.name)}<span class="count">${count > 0 ? "· " + count : ""}</span>`;
          btn.onclick = () => { activeSectionIdx = idx; activeCategoryTab = null; renderAll(); };
          nav.appendChild(btn);
        });
        const addBtn = document.createElement("button");
        addBtn.className = "add-section-btn";
        addBtn.textContent = "+ قسم جديد";
        addBtn.onclick = () => openSectionModal();
        nav.appendChild(addBtn);
      }

      function renderMainPanel() {
        const panel = document.getElementById("mainPanel");
        if (sections.length === 0) {
          panel.innerHTML = `<div class="section-panel"><p class="empty-note" style="text-align:center;padding:40px 0;font-size:14px;">اضغط "+ قسم جديد" لبدء إضافة الأقسام والبنود</p></div>`;
          return;
        }
        const sec = sections[activeSectionIdx];
        if (!sec) return;
        const allItems = sec.items || [];

        // Always show all categories as tabs
        const catsInSection = [];
        const catCounts = {};
        allItems.forEach(it => {
          const cid = it.category_id != null ? Number(it.category_id) : null;
          if (!catCounts[cid]) catCounts[cid] = 0;
          catCounts[cid]++;
        });
        allPickerCategories.forEach(cat => {
          catsInSection.push({ id: cat.id, name: cat.name, count: catCounts[cat.id] || 0 });
        });

        // Show unclassified if items exist without category_id
        const unclassCount = catCounts[null] || 0;

        // Filter items by active tab
        let items;
        if (activeCategoryTab === null) {
          items = allItems;
        } else if (activeCategoryTab === "__unclassified__") {
          items = allItems.filter(it => !it.category_id);
        } else {
          items = allItems.filter(it => (it.category_id != null ? Number(it.category_id) : null) === activeCategoryTab);
        }

        // Category tabs HTML
        let catTabsHtml = '';
        const totalClassified = catsInSection.reduce((s, c) => s + c.count, 0);
        const totalAll = allItems.length;
        if (allPickerCategories.length > 0 || unclassCount > 0) {
          catTabsHtml = `<div class="category-tabs" id="categoryTabs">
            <button class="category-tab${activeCategoryTab === null ? ' active' : ''}" data-cat="all">
              الكل<span class="cat-count">${totalAll}</span>
            </button>`;
          catsInSection.forEach(cat => {
            catTabsHtml += `<button class="category-tab${activeCategoryTab === cat.id ? ' active' : ''}" data-cat="${cat.id}">
              ${escapeAttr(cat.name)}<span class="cat-count">${cat.count}</span>
            </button>`;
          });
          if (unclassCount > 0) {
            catTabsHtml += `<button class="category-tab${activeCategoryTab === '__unclassified__' ? ' active' : ''}" data-cat="__unclassified__">
              غير مصنف<span class="cat-count">${unclassCount}</span>
            </button>`;
          }
          catTabsHtml += `</div>`;
        }

        // Search row (always visible)
        let searchHtml = '';
        {
          const activeCatName = (activeCategoryTab && activeCategoryTab !== '__unclassified__')
            ? (allPickerCategories.find(c => c.id === activeCategoryTab)?.name || '')
            : '';
          const searchPlaceholder = activeCatName
            ? `بحث في ${escapeAttr(activeCatName)} — اكتب أو اضغط لعرض كل البنود...`
            : 'بحث في كل الفئات — اكتب اسم البند أو الكود...';
          searchHtml = `<div class="cat-search-row">
            <input class="cat-search-input" id="catSearchInput" type="text" placeholder="${searchPlaceholder}" autocomplete="off" />
            <button class="cat-search-clear" id="catSearchClear" title="مسح">✕</button>
            <div class="cat-search-results" id="catSearchResults"></div>
          </div>`;
        }

        let rows = "";
        items.forEach((it, itemIdx) => {
          const origIdx = allItems.indexOf(it);
          const total = (Number(it.qty) || 0) * (Number(it.selling_price) || 0);
          const imgCell = it.image
            ? `<td class="col-img"><div class="item-thumb-wrap" data-action="view-img"><img src="${it.image}" alt=""><button class="item-thumb-rm" data-action="rm-img" title="إزالة">✕</button></div></td>`
            : `<td class="col-img"><button class="item-img-btn" data-action="add-img" title="إرفاق صورة">📷</button></td>`;

          const costCell = isOwnerOrAdmin
            ? `<td style="min-width:160px"><div class="cost-fields">
                <input type="number" min="0" step="0.1" class="f-basecost" value="${it.base_cost || 0}" title="التكلفة الأساسية" />
                <span class="pct-badge">%</span>
                <input type="number" min="0" max="100" step="1" class="f-overhead" value="${it.overhead_pct || 35}" title="نسبة هامش الربح" />
              </div></td>`
            : "";

          rows += `<tr data-idx="${origIdx}">
            <td class="col-code">${escapeAttr(it.item_code)}</td>
            <td class="col-name" style="position:relative"><input type="text" class="f-name" value="${escapeAttr(it.name)}" placeholder="اسم البند" autocomplete="off" /><div class="fname-autocomplete" id="fnameAc_${origIdx}"></div></td>
            <td class="col-desc"><input type="text" class="f-desc" value="${escapeAttr(it.description)}" placeholder="وصف تفصيلي"></td>
            ${imgCell}
            <td class="col-unit"><select class="f-unit">${UNITS.map(u => `<option value="${u}" ${u === it.unit ? "selected" : ""}>${u}</option>`).join("")}</select></td>
            <td class="col-qty"><input type="number" min="0" step="0.1" class="f-qty" value="${it.qty}"></td>
            <td class="col-price"><input type="number" min="0" step="0.1" class="f-price" value="${moneyShort(it.selling_price)}" ${isOwnerOrAdmin ? 'readonly style="background:var(--surface);color:var(--gold);font-weight:700;"' : ''}></td>
            ${costCell}
            <td class="col-total">${moneyInt(total)}</td>
            <td class="col-notes"><input type="text" class="f-notes" value="${escapeAttr(it.notes)}" placeholder="ملاحظات"></td>
            <td class="col-del"><button class="del-btn" title="حذف">✕</button></td>
          </tr>`;
        });

        const costHeader = isOwnerOrAdmin ? '<th style="min-width:160px">التكلفة + الهامش</th>' : '';

        panel.innerHTML = `<div class="section-panel">
          <h2><span class="sec-code">${escapeAttr(sec.code)}</span>${escapeAttr(sec.name)}</h2>
          <p class="section-sub">أضف بنود هذا القسم — التكلفة والهامش يظهر فقط للمدير/المالك.</p>
          <div class="section-actions">
            <button class="btn-rename" id="renameSecBtn">تعديل الاسم</button>
            <button class="btn-delete-sec" id="deleteSecBtn">حذف القسم</button>
          </div>
          ${catTabsHtml}
          ${searchHtml}
          ${items.length
            ? `<table class="items"><thead><tr>
                <th class="col-code">#</th><th class="col-name">البند</th><th class="col-desc">الوصف</th><th class="col-img"></th>
                <th class="col-unit">الوحدة</th><th class="col-qty">الكمية</th>
                <th class="col-price">سعر البيع</th>${costHeader}
                <th class="col-total">الإجمالي</th><th class="col-notes">ملاحظات</th><th class="col-del"></th>
              </tr></thead><tbody>${rows}</tbody></table>`
            : `<p class="empty-note" style="padding:20px 0;">${activeCategoryTab ? 'ما في بنود لهالقسم. ابدأ بإضافة أول بند.' : 'ما في بنود لسا. ابدأ بإضافة أول بند.'}</p>`
          }
          <button class="add-item-btn" id="addItemBtn">+ إضافة بند</button>
          ${isOwnerOrAdmin ? '<button class="pick-catalog-btn" id="pickCatalogBtn">📂 اختيار من كتالوج الأسعار</button>' : ''}
          <div class="section-subtotal" id="secSubtotal"></div>
        </div>`;

        // Section subtotal
        const secSub = allItems.reduce((s, it) => s + (Number(it.qty) || 0) * (Number(it.selling_price) || 0), 0);
        document.getElementById("secSubtotal").textContent = `► إجمالي القسم: ${moneyInt(secSub)}`;

        // Category tab click events
        document.querySelectorAll("#categoryTabs .category-tab").forEach(tab => {
          tab.onclick = () => {
            const val = tab.dataset.cat;
            if (val === 'all') activeCategoryTab = null;
            else if (val === '__unclassified__') activeCategoryTab = '__unclassified__';
            else activeCategoryTab = Number(val);
            renderAll();
          };
        });

        // ---- Item Search / Autocomplete ----
        const catSearchInput = document.getElementById("catSearchInput");
        const catSearchResults = document.getElementById("catSearchResults");
        const catSearchClear = document.getElementById("catSearchClear");
        let catSearchTimeout = null;
        let catHighlightIdx = -1;
        let catCachedItems = [];

        function renderSearchResults(items, query) {
          if (items.length === 0) {
            catSearchResults.innerHTML = `
              <div class="cat-search-empty">
                <div class="empty-title">ما في نتائج لـ "${escapeAttr(query)}"</div>
                <div>ممكن تكتب كود تاني أو تضيف البند يدوياً</div>
                <button class="cat-search-manual-btn" id="catSearchManualBtn">+ إضافة "${escapeAttr(query)}" كبند جديد</button>
              </div>`;
            catHighlightIdx = -1;
            const manualBtn = document.getElementById("catSearchManualBtn");
            if (manualBtn) {
              manualBtn.onclick = async () => {
                await addItemManual(query);
                catSearchInput.value = "";
                catSearchClear.classList.remove("visible");
                catSearchResults.classList.remove("open");
              };
            }
            return;
          }

          const header = `<div class="cat-search-header"><span>${query ? 'نتائج البحث' : 'كل البنود'}</span><span class="result-count">${items.length} بند</span></div>`;

          const rows = items.map((it, i) => `
            <div class="cat-search-item${i === catHighlightIdx ? ' highlighted' : ''}" data-idx="${i}" data-id="${it.id}">
              <div class="csi-info">
                ${it.item_code ? `<div class="csi-code">${highlightText(it.item_code, query)}</div>` : ''}
                <div class="csi-name">${highlightText(it.name, query)}</div>
                ${it.description ? `<div class="csi-desc">${highlightText(it.description, query)}</div>` : ''}
              </div>
              <div class="csi-meta">
                <span class="csi-unit">${escapeAttr(it.unit)}</span>
                <span class="csi-price">${money(it.selling_price)}</span>
              </div>
            </div>`).join("");

          catSearchResults.innerHTML = header + rows;
          catHighlightIdx = -1;

          catSearchResults.querySelectorAll(".cat-search-item").forEach(el => {
            el.onclick = async () => {
              const id = Number(el.dataset.id);
              const pItem = items.find(i => Number(i.id) === id);
              if (pItem) await addItemFromCatalog(pItem);
              catSearchInput.value = "";
              catSearchClear.classList.remove("visible");
              catSearchResults.classList.remove("open");
            };
          });
        }

        if (catSearchInput && catSearchResults) {
          catSearchInput.onfocus = async () => {
            catSearchResults.classList.add("open");
            const q = catSearchInput.value.trim();
            if (q) {
              catSearchInput.dispatchEvent(new Event('input'));
              return;
            }
            catSearchResults.innerHTML = '<div class="cat-search-loading">جاري تحميل البنود...</div>';
            if (activeCategoryTab && activeCategoryTab !== '__unclassified__') {
              catCachedItems = await fetchCategoryItems(activeCategoryTab);
            } else {
              catCachedItems = await fetchAllCategoryItems();
            }
            renderSearchResults(catCachedItems, "");
          };

          catSearchInput.oninput = () => {
            const val = catSearchInput.value;
            catSearchClear.classList.toggle("visible", val.length > 0);
            clearTimeout(catSearchTimeout);
            catSearchTimeout = setTimeout(async () => {
              const q = val.trim();
              catSearchResults.classList.add("open");
              if (!catCachedItems.length) {
                if (activeCategoryTab && activeCategoryTab !== '__unclassified__') {
                  catCachedItems = await fetchCategoryItems(activeCategoryTab);
                } else {
                  catCachedItems = await fetchAllCategoryItems();
                }
              }
              let filtered;
              if (!q) {
                filtered = catCachedItems;
              } else {
                filtered = catCachedItems.filter(it =>
                  fuzzyMatch(it.name, q) ||
                  fuzzyMatch(it.item_code || '', q) ||
                  fuzzyMatch(it.description || '', q)
                );
              }
              renderSearchResults(filtered, q);
            }, 200);
          };

          catSearchInput.onkeydown = async (e) => {
            const items = catSearchResults.querySelectorAll(".cat-search-item");
            if (e.key === "ArrowDown") {
              e.preventDefault();
              catHighlightIdx = Math.min(catHighlightIdx + 1, items.length - 1);
              items.forEach((el, i) => el.classList.toggle("highlighted", i === catHighlightIdx));
              if (items[catHighlightIdx]) items[catHighlightIdx].scrollIntoView({ block: "nearest" });
            } else if (e.key === "ArrowUp") {
              e.preventDefault();
              catHighlightIdx = Math.max(catHighlightIdx - 1, 0);
              items.forEach((el, i) => el.classList.toggle("highlighted", i === catHighlightIdx));
              if (items[catHighlightIdx]) items[catHighlightIdx].scrollIntoView({ block: "nearest" });
            } else if (e.key === "Enter") {
              e.preventDefault();
              if (catHighlightIdx >= 0 && items[catHighlightIdx]) {
                items[catHighlightIdx].click();
              } else {
                const q = catSearchInput.value.trim();
                if (q) {
                  await addItemManual(q);
                  catSearchInput.value = "";
                  catSearchClear.classList.remove("visible");
                  catSearchResults.classList.remove("open");
                }
              }
            } else if (e.key === "Escape") {
              catSearchResults.classList.remove("open");
              catSearchInput.blur();
            }
          };

          if (catSearchClear) {
            catSearchClear.onclick = () => {
              catSearchInput.value = "";
              catSearchClear.classList.remove("visible");
              catSearchInput.focus();
              catSearchInput.dispatchEvent(new Event('input'));
            };
          }

          if (window._docClickSearchHandler) {
            document.removeEventListener('click', window._docClickSearchHandler);
          }
          window._docClickSearchHandler = (e) => {
            if (catSearchResults && catSearchInput && !catSearchInput.contains(e.target) && !catSearchResults.contains(e.target)) {
              catSearchResults.classList.remove("open");
            }
          };
          document.addEventListener('click', window._docClickSearchHandler);
        }

        // Event: rename/delete for custom sections
        const renameBtn = document.getElementById("renameSecBtn");
        if (renameBtn) renameBtn.onclick = () => openSectionModal(activeSectionIdx);
        const deleteBtn = document.getElementById("deleteSecBtn");
        if (deleteBtn) deleteBtn.onclick = async () => {
          if (!confirm(`هل أنت متأكد من حذف قسم "${sec.name}"؟`)) return;
          try {
            if (currentQuoteId && sec.id) {
              await api(`/quotes/${currentQuoteId}/sections/${sec.id}`, { method: "DELETE" });
            }
            sections.splice(activeSectionIdx, 1);
            if (activeSectionIdx >= sections.length) activeSectionIdx = Math.max(0, sections.length - 1);
            activeCategoryTab = null;
            renderAll();
            showToast("تم حذف القسم");
          } catch (e) { showToast(e.message); }
        };

        // Event: add item (empty)
        document.getElementById("addItemBtn").onclick = async () => {
          const newItem = {
            item_code: `${sec.code}.${allItems.length + 1}`,
            name: "", description: "", unit: "عدد", qty: 1,
            base_cost: 0, overhead_pct: 35, selling_price: 0, notes: "", image: null,
            category_id: (activeCategoryTab && activeCategoryTab !== '__unclassified__') ? activeCategoryTab : null,
          };
          if (currentQuoteId && sec.id) {
            try {
              const res = await api(`/sections/${sec.id}/items`, {
                method: "POST", body: JSON.stringify(newItem),
              });
              newItem.id = res.id;
              newItem.selling_price = res.selling_price;
            } catch (e) {
              showToast("تمت الإضافة محلياً — تعذر الحفظ: " + e.message);
            }
          }
          allItems.push(newItem);
          renderAll();
        };

        // Event: pick from catalog
        const pickBtn = document.getElementById("pickCatalogBtn");
        if (pickBtn) {
          pickBtn.onclick = async () => {
            const newItem = {
              item_code: `${sec.code}.${allItems.length + 1}`,
              name: "", description: "", unit: "عدد", qty: 1,
              base_cost: 0, overhead_pct: 35, selling_price: 0, notes: "", image: null,
              category_id: (activeCategoryTab && activeCategoryTab !== '__unclassified__') ? activeCategoryTab : null,
            };
            if (currentQuoteId && sec.id) {
              try {
                const res = await api(`/sections/${sec.id}/items`, {
                  method: "POST", body: JSON.stringify(newItem),
                });
                newItem.id = res.id;
                newItem.selling_price = res.selling_price;
              } catch (e) {
                showToast("تمت الإضافة محلياً — تعذر الحفظ: " + e.message);
              }
            }
            allItems.push(newItem);
            renderAll();
            const preCat = (activeCategoryTab && activeCategoryTab !== '__unclassified__') ? activeCategoryTab : null;
            openPicker(allItems.length - 1, preCat);
          };
        }

        // Item row events
        panel.querySelectorAll("tr[data-idx]").forEach((tr) => {
          const idx = Number(tr.getAttribute("data-idx"));
          const item = allItems[idx];

          // f-name autocomplete
          const fNameInput = tr.querySelector(".f-name");
          const fNameAc = document.getElementById("fnameAc_" + idx);
          let fNameTimeout = null;
          let fNameHighlightIdx = -1;
          let fNameCachedItems = [];

          fNameInput.oninput = (e) => {
            item.name = e.target.value;
            clearTimeout(fNameTimeout);
            if (!fNameAc) return;
            const val = e.target.value.trim();
            if (!val) { fNameAc.classList.remove("open"); fNameAc.innerHTML = ""; return; }
            fNameTimeout = setTimeout(async () => {
              if (!fNameCachedItems.length) {
                fNameCachedItems = await fetchAllCategoryItems();
              }
              const filtered = fNameCachedItems.filter(it =>
                fuzzyMatch(it.name, val) ||
                fuzzyMatch(it.item_code || '', val) ||
                fuzzyMatch(it.description || '', val)
              ).slice(0, 12);
              if (filtered.length === 0) {
                fNameAc.innerHTML = '<div class="fname-ac-empty">ما في نتائج</div>';
                fNameAc.classList.add("open");
                fNameHighlightIdx = -1;
                return;
              }
              fNameHighlightIdx = -1;
              fNameAc.innerHTML = filtered.map((it, i) => `
                <div class="fname-ac-item" data-idx="${i}" data-id="${it.id}">
                  <div class="fac-info">
                    ${it.item_code ? `<div class="fac-code">${highlightText(it.item_code, val)}</div>` : ''}
                    <div class="fac-name">${highlightText(it.name, val)}</div>
                  </div>
                  <div style="display:flex;align-items:center;gap:6px;">
                    <span class="fac-unit">${escapeAttr(it.unit)}</span>
                    <span class="fac-price">${money(it.selling_price)}</span>
                  </div>
                </div>`).join("");
              fNameAc.classList.add("open");
              fNameAc.querySelectorAll(".fname-ac-item").forEach(el => {
                el.onmousedown = (ev) => {
                  ev.preventDefault();
                  const id = Number(el.dataset.id);
                  const catItem = fNameCachedItems.find(i => Number(i.id) === id);
                  if (catItem) {
                    item.name = catItem.name || item.name;
                    item.description = catItem.description || item.description;
                    item.unit = catItem.unit || item.unit;
                    item.item_code = catItem.item_code || item.item_code;
                    item.base_cost = Number(catItem.base_cost) || 0;
                    item.overhead_pct = Number(catItem.overhead_pct) || 35;
                    item.selling_price = Number(catItem.selling_price) || 0;
                    if (!item.category_id && catItem.category_id) item.category_id = catItem.category_id;
                    renderAll();
                    showToast("تم تعبئة البند من الكتالوج");
                  }
                  fNameAc.classList.remove("open");
                };
              });
            }, 200);
          };

          fNameInput.onkeydown = (e) => {
            if (!fNameAc || !fNameAc.classList.contains("open")) return;
            const acItems = fNameAc.querySelectorAll(".fname-ac-item");
            if (e.key === "ArrowDown") {
              e.preventDefault();
              fNameHighlightIdx = Math.min(fNameHighlightIdx + 1, acItems.length - 1);
              acItems.forEach((el, i) => el.classList.toggle("highlighted", i === fNameHighlightIdx));
              if (acItems[fNameHighlightIdx]) acItems[fNameHighlightIdx].scrollIntoView({ block: "nearest" });
            } else if (e.key === "ArrowUp") {
              e.preventDefault();
              fNameHighlightIdx = Math.max(fNameHighlightIdx - 1, 0);
              acItems.forEach((el, i) => el.classList.toggle("highlighted", i === fNameHighlightIdx));
              if (acItems[fNameHighlightIdx]) acItems[fNameHighlightIdx].scrollIntoView({ block: "nearest" });
            } else if (e.key === "Enter") {
              if (fNameHighlightIdx >= 0 && acItems[fNameHighlightIdx]) {
                e.preventDefault();
                acItems[fNameHighlightIdx].dispatchEvent(new Event("mousedown"));
              }
            } else if (e.key === "Escape") {
              fNameAc.classList.remove("open");
            }
          };

          fNameInput.onfocus = () => {
            if (fNameInput.value.trim()) fNameInput.dispatchEvent(new Event('input'));
          };
          tr.querySelector(".f-desc").oninput = (e) => { item.description = e.target.value; };
          tr.querySelector(".f-unit").onchange = (e) => { item.unit = e.target.value; };
          tr.querySelector(".f-notes").oninput = (e) => { item.notes = e.target.value; };

          tr.querySelector(".f-qty").oninput = (e) => {
            item.qty = Number(e.target.value) || 0;
            recalcItem(item);
            renderTotals();
          };

          const priceInput = tr.querySelector(".f-price");
          if (!isOwnerOrAdmin) {
            priceInput.oninput = (e) => {
              item.selling_price = Number(e.target.value) || 0;
              renderTotals();
            };
          }

          if (isOwnerOrAdmin) {
            const baseCostInput = tr.querySelector(".f-basecost");
            const overheadInput = tr.querySelector(".f-overhead");
            if (baseCostInput) baseCostInput.oninput = (e) => {
              item.base_cost = Number(e.target.value) || 0;
              recalcItem(item);
              renderTotals();
            };
            if (overheadInput) overheadInput.oninput = (e) => {
              item.overhead_pct = Number(e.target.value) || 0;
              recalcItem(item);
              renderTotals();
            };
          }

          tr.querySelector(".del-btn").onclick = async () => {
            if (currentQuoteId && item.id) {
              await api(`/sections/${sec.id}/items/${item.id}`, { method: "DELETE" });
            }
            allItems.splice(idx, 1);
            renderAll();
          };

          // Image
          const imgBtn = tr.querySelector("[data-action='add-img']");
          const thumbWrap = tr.querySelector("[data-action='view-img']");
          const rmBtn = tr.querySelector("[data-action='rm-img']");
          if (imgBtn) {
            const fileInput = document.createElement("input");
            fileInput.type = "file"; fileInput.accept = "image/*"; fileInput.className = "item-img-input";
            tr.querySelector(".col-img").appendChild(fileInput);
            imgBtn.onclick = () => fileInput.click();
            fileInput.onchange = async (e) => {
              const file = e.target.files && e.target.files[0];
              if (!file) return;
              item.image = await compressImage(file);
              renderAll();
            };
          }
          if (thumbWrap) {
            thumbWrap.onclick = (e) => {
              if (e.target.classList.contains("item-thumb-rm")) return;
              openLightbox(item.image);
            };
          }
          if (rmBtn) {
            rmBtn.onclick = (e) => {
              e.stopPropagation();
              item.image = null;
              renderAll();
            };
          }
        });

        // Close fname autocomplete on outside click
        document.addEventListener('click', (e) => {
          if (!e.target.closest('.col-name')) {
            document.querySelectorAll('.fname-autocomplete.open').forEach(ac => ac.classList.remove('open'));
          }
        });
      }

      async function addItemFromCatalog(catItem) {
        const sec = sections[activeSectionIdx];
        if (!sec) return;
        const allItems = sec.items || [];
        const newItem = {
          item_code: catItem.item_code || `${sec.code}.${allItems.length + 1}`,
          name: catItem.name || "",
          description: catItem.description || "",
          unit: catItem.unit || "عدد",
          qty: 1,
          base_cost: Number(catItem.base_cost) || 0,
          overhead_pct: Number(catItem.overhead_pct) || 35,
          selling_price: Number(catItem.selling_price) || 0,
          notes: "",
          image: null,
          category_id: (activeCategoryTab && activeCategoryTab !== '__unclassified__') ? activeCategoryTab : null,
        };
        if (currentQuoteId && sec.id) {
          try {
            const res = await api(`/sections/${sec.id}/items`, {
              method: "POST", body: JSON.stringify(newItem),
            });
            newItem.id = res.id;
            newItem.selling_price = res.selling_price;
          } catch (e) {
            showToast("تمت الإضافة محلياً — تعذر الحفظ على السيرفر: " + e.message);
          }
        }
        allItems.push(newItem);
        renderAll();
        showToast("تمت إضافة البند من الكتالوج");
      }

      async function addItemManual(nameText) {
        const sec = sections[activeSectionIdx];
        if (!sec) return;
        const allItems = sec.items || [];
        const newItem = {
          item_code: `${sec.code}.${allItems.length + 1}`,
          name: nameText,
          description: "",
          unit: "عدد",
          qty: 1,
          base_cost: 0,
          overhead_pct: 35,
          selling_price: 0,
          notes: "",
          image: null,
          category_id: (activeCategoryTab && activeCategoryTab !== '__unclassified__') ? activeCategoryTab : null,
        };
        if (currentQuoteId && sec.id) {
          try {
            const res = await api(`/sections/${sec.id}/items`, {
              method: "POST", body: JSON.stringify(newItem),
            });
            newItem.id = res.id;
            newItem.selling_price = res.selling_price;
          } catch (e) {
            showToast("تمت الإضافة محلياً — تعذر الحفظ على السيرفر: " + e.message);
          }
        }
        allItems.push(newItem);
        renderAll();
        showToast("تمت إضافة البند يدوياً");
      }

      function recalcItem(item) {
        const base = Number(item.base_cost) || 0;
        const pct = Number(item.overhead_pct) || 0;
        item.selling_price = base * (1 + pct / 100);
      }

      function renderTotals() {
        // Sidebar sections
        const secEl = document.getElementById("sidebarSections");
        secEl.innerHTML = sections.map((sec) => {
          const sub = (sec.items || []).reduce((s, it) => s + (Number(it.qty) || 0) * (Number(it.selling_price) || 0), 0);
          return `<div class="sidebar-sec-row"><span>${escapeAttr(sec.code)}: ${escapeAttr(sec.name)}</span><span class="n">${moneyInt(sub)}</span></div>`;
        }).join("") || '<p class="empty-note">ابدأ بإضافة أقسام.</p>';

        // Compute totals
        let subtotal = 0, estimatedCost = 0;
        sections.forEach(sec => {
          (sec.items || []).forEach(it => {
            subtotal += (Number(it.qty) || 0) * (Number(it.selling_price) || 0);
            estimatedCost += (Number(it.qty) || 0) * (Number(it.base_cost) || 0);
          });
        });

        const discountType = state.discountType;
        const discountVal = Number(state.discountVal) || 0;
        const taxPct = Number(state.taxPct) || 16;
        let discount = discountType === "pct" ? (subtotal * discountVal / 100) : discountVal;
        const afterDiscount = Math.max(subtotal - discount, 0);
        const vat = afterDiscount * taxPct / 100;
        const grandTotal = afterDiscount + vat;
        const profitMargin = estimatedCost > 0 ? ((grandTotal / estimatedCost - 1) * 100).toFixed(1) : 0;

        document.getElementById("totalsBreakdown").innerHTML = `
          <div class="tb-row"><span>مجموع البنود</span><span class="n">${moneyInt(subtotal)}</span></div>
          ${discount > 0 ? `<div class="tb-row"><span>الخصم</span><span class="n">- ${moneyInt(discount)}</span></div>` : ""}
          <div class="tb-row"><span>بعد الخصم</span><span class="n">${moneyInt(afterDiscount)}</span></div>
          <div class="tb-row"><span>الضريبة (${taxPct}%)</span><span class="n">+ ${moneyInt(vat)}</span></div>
          <div class="tb-row highlight"><span>التكلفة المقدرة</span><span class="n">${moneyInt(estimatedCost)}</span></div>
          <div class="tb-row highlight"><span>هامش الربح</span><span class="n">${profitMargin}%</span></div>`;

        document.getElementById("grandTotalVal").textContent = moneyInt(grandTotal);

        // Payment terms
        renderPaymentTerms(grandTotal);

        // Update item totals in main panel
        document.querySelectorAll("#mainPanel tr[data-idx]").forEach((tr) => {
          const idx = Number(tr.getAttribute("data-idx"));
          const sec = sections[activeSectionIdx];
          if (sec && sec.items[idx]) {
            const it = sec.items[idx];
            const lt = (Number(it.qty) || 0) * (Number(it.selling_price) || 0);
            tr.querySelector(".col-total").textContent = moneyInt(lt);
            if (isOwnerOrAdmin) {
              const priceInput = tr.querySelector(".f-price");
              if (priceInput) priceInput.value = moneyShort(it.selling_price);
            }
          }
        });

        // Section subtotal
        if (sections[activeSectionIdx]) {
          const secSub = (sections[activeSectionIdx].items || []).reduce(
            (s, it) => s + (Number(it.qty) || 0) * (Number(it.selling_price) || 0), 0
          );
          const el = document.getElementById("secSubtotal");
          if (el) el.textContent = `► إجمالي القسم: ${moneyInt(secSub)}`;
        }

      }

      function renderPaymentTerms(grandTotal) {
        const el = document.getElementById("paymentTerms");
        el.innerHTML = state.paymentTerms.map((term, i) => {
          const amt = (grandTotal * (term.percentage || 0)) / 100;
          return `<div class="payment-row">
            <input type="number" min="0" max="100" class="pct-input" value="${term.percentage}" data-idx="${i}" data-field="percentage" />
            <input type="text" class="desc-input" value="${escapeAttr(term.trigger_description)}" data-idx="${i}" data-field="trigger_description" placeholder="الوصف" />
            <span class="amt">${moneyShortInt(amt)} د.أ</span>
          </div>`;
        }).join("");
        el.querySelectorAll("input").forEach(inp => {
          inp.oninput = (e) => {
            const idx = Number(e.target.dataset.idx);
            const field = e.target.dataset.field;
            if (field === "percentage") state.paymentTerms[idx].percentage = Number(e.target.value) || 0;
            else state.paymentTerms[idx].trigger_description = e.target.value;
            renderPaymentTerms(grandTotal);
          };
        });
      }

      function renderAll() {
        renderSectionsNav();
        renderMainPanel();
        renderTotals();
      }

      // ---- Modals ----
      let editingSectionIdx = null;
      function openSectionModal(idx) {
        editingSectionIdx = idx !== undefined ? idx : null;
        const modal = document.getElementById("sectionModal");
        document.getElementById("sectionModalTitle").textContent = editingSectionIdx !== null ? "تعديل القسم" : "إضافة قسم جديد";
        document.getElementById("secModalCode").value = editingSectionIdx !== null ? sections[editingSectionIdx].code : nextSectionCode();
        document.getElementById("secModalName").value = editingSectionIdx !== null ? sections[editingSectionIdx].name : "";
        modal.classList.add("open");
        document.getElementById("secModalName").focus();
      }
      function closeSectionModal() {
        document.getElementById("sectionModal").classList.remove("open");
      }
      document.getElementById("secModalCancel").onclick = closeSectionModal;
      document.getElementById("sectionModal").onclick = (e) => { if (e.target === e.currentTarget) closeSectionModal(); };
      document.getElementById("secModalSave").onclick = async () => {
        const code = document.getElementById("secModalCode").value.trim();
        const name = document.getElementById("secModalName").value.trim();
        if (!code || !name) { showToast("الكود والاسم مطلوبين"); return; }

        if (editingSectionIdx !== null) {
          const sec = sections[editingSectionIdx];
          sec.code = code; sec.name = name;
          if (currentQuoteId && sec.id) {
            await api(`/quotes/${currentQuoteId}/sections/${sec.id}`, {
              method: "PUT", body: JSON.stringify({ code, name }),
            });
          }
        } else {
          const newSec = { code, name, items: [], sort_order: sections.length };
          if (currentQuoteId) {
            const res = await api(`/quotes/${currentQuoteId}/sections`, {
              method: "POST", body: JSON.stringify({ code, name, sort_order: sections.length }),
            });
            newSec.id = res.id;
          }
          sections.push(newSec);
          activeSectionIdx = sections.length - 1;
        }
        closeSectionModal();
        renderAll();
        showToast(editingSectionIdx !== null ? "تم تعديل القسم" : "تمت إضافة القسم");
      };

      function openTemplateModal(mode) {
        const modal = document.getElementById("templateModal");
        const body = document.getElementById("templateModalBody");
        document.getElementById("templateModalTitle").textContent = mode === "save" ? "حفظ كقالب" : "تحميل قالب";
        if (mode === "save") {
          body.innerHTML = `
            <label>اسم القالب<input id="tmplName" type="text" placeholder="مثال: قالب غرف النوم" /></label>
            <label>الوصف<textarea id="tmplDesc" placeholder="وصف مختصر للقالب"></textarea></label>
            <div class="modal-actions">
              <button id="tmplCancel" class="btn-secondary" style="background:none;border:1px solid var(--pewter)!important;color:var(--ash);">إلغاء</button>
              <button id="tmplSaveBtn" class="btn-save">حفظ</button>
            </div>`;
          document.getElementById("tmplCancel").onclick = closeTemplateModal;
          document.getElementById("tmplSaveBtn").onclick = async () => {
            const name = document.getElementById("tmplName").value.trim();
            if (!name) { showToast("الاسم مطلوب"); return; }
            const data = { ...state, sections: sections.map(s => ({ ...s, items: s.items })) };
            await api("/templates", { method: "POST", body: JSON.stringify({ name, description: document.getElementById("tmplDesc").value, data }) });
            closeTemplateModal();
            showToast("تم حفظ القالب");
          };
        } else {
          body.innerHTML = '<p class="empty-note">جاري تحميل القوالب...</p>';
          modal.classList.add("open");
          api("/templates").then(({ templates }) => {
            if (templates.length === 0) {
              body.innerHTML = '<p class="empty-note">ما في قوالب محفوظة.</p>';
              return;
            }
            body.innerHTML = templates.map(t => `
              <div class="saved-item">
                <div class="info">
                  <div class="name">${escapeAttr(t.name)}</div>
                  <div class="meta">${escapeAttr(t.description || "")}</div>
                </div>
                <div class="btns">
                  <button class="tmpl-load-btn" data-id="${t.id}">تحميل</button>
                  <button class="tmpl-del-btn" data-id="${t.id}">حذف</button>
                </div>
              </div>
            `).join("");
            body.querySelectorAll(".tmpl-load-btn").forEach(btn => {
              btn.onclick = async () => {
                const res = await api(`/templates/${btn.dataset.id}/clone`, { method: "POST" });
                currentQuoteId = res.id;
                await loadQuote(currentQuoteId);
                closeTemplateModal();
                showToast("تم تحميل القالب");
              };
            });
            body.querySelectorAll(".tmpl-del-btn").forEach(btn => {
              btn.onclick = async () => {
                await api(`/templates/${btn.dataset.id}`, { method: "DELETE" });
                btn.closest(".saved-item").remove();
              };
            });
          });
        }
      }
      function closeTemplateModal() {
        document.getElementById("templateModal").classList.remove("open");
      }
      document.getElementById("templateModal").onclick = (e) => { if (e.target === e.currentTarget) closeTemplateModal(); };

      // ---- Catalog Picker ----
      let pickerActiveCatId = null;
      let pickerCurrentItemIdx = null; // which item row is being filled

      function openPicker(itemIdx, preselectedCategoryId) {
        pickerCurrentItemIdx = itemIdx;
        pickerActiveCatId = null;
        document.getElementById("pickerSearch").value = "";
        document.getElementById("pickerResults").innerHTML = '<div class="picker-empty">اختر قسم أولاً للبحث عن بنود</div>';
        loadPickerCategories(preselectedCategoryId);
        document.getElementById("pickerModal").classList.add("open");
      }
      function closePicker() {
        document.getElementById("pickerModal").classList.remove("open");
        pickerCurrentItemIdx = null;
      }
      document.getElementById("pickerModal").onclick = (e) => { if (e.target === e.currentTarget) closePicker(); };

      async function loadPickerCategories(preselectedCategoryId) {
        try {
          if (allPickerCategories.length === 0) {
            const data = await api("/price-list");
            allPickerCategories = data.categories || [];
          }
          renderPickerCategories();
          if (preselectedCategoryId) {
            pickerActiveCatId = preselectedCategoryId;
            renderPickerCategories();
            loadPickerItems();
          }
        } catch {
          document.getElementById("pickerCats").innerHTML = '<span style="color:var(--ash);font-size:12px;">تعذر تحميل الأقسام</span>';
        }
      }

      function renderPickerCategories() {
        const el = document.getElementById("pickerCats");
        if (allPickerCategories.length === 0) {
          el.innerHTML = '<span style="color:var(--ash);font-size:12px;">ما في أقسام بعد. <a href="/price-list" style="color:var(--gold);">أنشئ أقساماً أولاً</a></span>';
          return;
        }
        el.innerHTML = allPickerCategories.map(cat => `
          <button class="picker-cat-btn${cat.id === pickerActiveCatId ? ' active' : ''}" data-id="${cat.id}">${escapeAttr(cat.name)} (${cat.item_count})</button>
        `).join("");
        el.querySelectorAll(".picker-cat-btn").forEach(btn => {
          btn.onclick = () => {
            pickerActiveCatId = Number(btn.dataset.id);
            renderPickerCategories();
            document.getElementById("pickerSearch").value = "";
            loadPickerItems();
          };
        });
      }

      let pickerSearchTimeout;
      document.getElementById("pickerSearch").oninput = () => {
        clearTimeout(pickerSearchTimeout);
        pickerSearchTimeout = setTimeout(() => loadPickerItems(), 300);
      };

      async function loadPickerItems() {
        if (!pickerActiveCatId) return;
        const q = document.getElementById("pickerSearch").value.trim();
        const queryStr = q ? `?q=${encodeURIComponent(q)}` : "";
        const resultsEl = document.getElementById("pickerResults");
        try {
          const data = await api(`/price-list/${pickerActiveCatId}/items${queryStr}`);
          const items = data.items || [];
          if (items.length === 0) {
            resultsEl.innerHTML = '<div class="picker-empty">ما في نتائج</div>';
            return;
          }
          resultsEl.innerHTML = items.map(it => `
            <div class="picker-item" data-id="${it.id}">
              <div class="pi-info">
                ${it.item_code ? `<div class="pi-code">${escapeAttr(it.item_code)}</div>` : ''}
                <div class="pi-name">${escapeAttr(it.name)}</div>
                ${it.description ? `<div class="pi-desc">${escapeAttr(it.description)}</div>` : ''}
              </div>
              <div style="display:flex;align-items:center;">
                <div class="pi-meta">${escapeAttr(it.unit)}</div>
                <div class="pi-price">${money(it.selling_price)}</div>
              </div>
            </div>
          `).join("");
          resultsEl.querySelectorAll(".picker-item").forEach(el => {
            el.onclick = () => {
              const id = Number(el.dataset.id);
              const item = items.find(i => Number(i.id) === id);
              if (item && pickerCurrentItemIdx !== null) fillItemFromCatalog(pickerCurrentItemIdx, item);
              closePicker();
            };
          });
        } catch {
          resultsEl.innerHTML = '<div class="picker-empty">صار في خطأ</div>';
        }
      }

      function fillItemFromCatalog(idx, catItem) {
        if (!sections[activeSectionIdx]) return;
        const sec = sections[activeSectionIdx];
        const item = sec.items[idx];
        if (!item) return;
        item.item_code = catItem.item_code || item.item_code;
        item.name = catItem.name || item.name;
        item.description = catItem.description || item.description;
        item.unit = catItem.unit || item.unit;
        item.base_cost = Number(catItem.base_cost) || 0;
        item.overhead_pct = Number(catItem.overhead_pct) || 35;
        item.selling_price = Number(catItem.selling_price) || (item.base_cost * (1 + item.overhead_pct / 100));
        if (!item.category_id && pickerActiveCatId) {
          item.category_id = pickerActiveCatId;
        }
        renderAll();
        showToast("تم تعبئة البند من الكتالوج");
      }

      // ---- Data Binding ----
      document.getElementById("projectName").oninput = (e) => { state.projectName = e.target.value; };
      document.getElementById("referenceNo").oninput = (e) => { state.referenceNo = e.target.value; };
      document.getElementById("clientName").oninput = (e) => { state.clientName = e.target.value; };
      document.getElementById("siteLocation").oninput = (e) => { state.siteLocation = e.target.value; };
      document.getElementById("taxPct").oninput = (e) => { state.taxPct = e.target.value; renderTotals(); };
      document.getElementById("discountVal").oninput = (e) => { state.discountVal = e.target.value; renderTotals(); };
      document.getElementById("discountType").onchange = (e) => { state.discountType = e.target.value; renderTotals(); };
      document.getElementById("executionDays").oninput = (e) => { state.executionDays = Number(e.target.value); };
      document.getElementById("validityDays").oninput = (e) => { state.validityDays = Number(e.target.value); };

      // ---- Save / Load ----
      async function saveQuote() {
        const btn = document.getElementById("saveQuoteBtn");
        btn.disabled = true; btn.textContent = "جاري الحفظ...";
        try {
          let subtotal = 0;
          sections.forEach(sec => {
            (sec.items || []).forEach(it => {
              subtotal += (Number(it.qty) || 0) * (Number(it.selling_price) || 0);
            });
          });
          let discount = state.discountType === "pct" ? (subtotal * Number(state.discountVal) / 100) : Number(state.discountVal);
          const afterDiscount = Math.max(subtotal - discount, 0);
          const vat = afterDiscount * Number(state.taxPct) / 100;
          const grandTotal = afterDiscount + vat;

          const body = {
            project_name: state.projectName || "مشروع بدون اسم",
            data: state,
            total: grandTotal,
            reference_no: state.referenceNo,
            client_name: state.clientName,
            site_location: state.siteLocation,
            discount_val: state.discountVal,
            discount_type: state.discountType,
            tax_pct: state.taxPct,
            execution_days: state.executionDays,
            validity_days: state.validityDays,
            payment_terms: state.paymentTerms,
          };

          if (currentQuoteId) {
            await api("/quotes/" + currentQuoteId, { method: "PUT", body: JSON.stringify(body) });
          } else {
            const res = await api("/quotes", { method: "POST", body: JSON.stringify(body) });
            currentQuoteId = res.id;
          }

          // Save sections & items
          for (const sec of sections) {
            if (!sec.id && currentQuoteId) {
              const res = await api(`/quotes/${currentQuoteId}/sections`, {
                method: "POST", body: JSON.stringify({ code: sec.code, name: sec.name, sort_order: sec.sort_order }),
              });
              sec.id = res.id;
            }
            for (const item of sec.items) {
              const itemPayload = { ...item, category_id: item.category_id || null };
              if (!item.id && sec.id) {
                const res = await api(`/sections/${sec.id}/items`, {
                  method: "POST", body: JSON.stringify(itemPayload),
                });
                item.id = res.id;
              } else if (item.id && sec.id) {
                await api(`/sections/${sec.id}/items/${item.id}`, {
                  method: "PUT", body: JSON.stringify(itemPayload),
                });
              }
            }
          }

          document.getElementById("pageTitle").textContent = state.projectName || "عرض سعر";
          showToast("تم حفظ العرض");
          loadSavedList();
        } catch (e) {
          showToast(e.message || "تعذر الحفظ");
        } finally {
          btn.disabled = false; btn.textContent = "حفظ العرض";
        }
      }

      async function loadQuote(id) {
        const { quote } = await api("/quotes/" + id);
        currentQuoteId = quote.id;
        state.projectName = quote.project_name || "";
        state.referenceNo = quote.reference_no || "";
        state.clientName = quote.client_name || "";
        state.siteLocation = quote.site_location || "";
        state.taxPct = quote.tax_pct || 16;
        state.discountVal = quote.discount_val || 0;
        state.discountType = quote.discount_type || "fixed";
        state.executionDays = quote.execution_days || 45;
        state.validityDays = quote.validity_days || 30;
        try { state.paymentTerms = JSON.parse(quote.payment_terms || "[]"); } catch { state.paymentTerms = []; }

        sections = (quote.sections || []).map(s => ({
          ...s,
          items: (s.items || []).map(it => ({ ...it, qty: Number(it.qty) || 1, category_id: it.category_id != null ? Number(it.category_id) : null })),
        }));
        activeSectionIdx = 0;
        activeCategoryTab = null;

        document.getElementById("projectName").value = state.projectName;
        document.getElementById("referenceNo").value = state.referenceNo;
        document.getElementById("clientName").value = state.clientName;
        document.getElementById("siteLocation").value = state.siteLocation;
        document.getElementById("taxPct").value = state.taxPct;
        document.getElementById("discountVal").value = state.discountVal;
        document.getElementById("discountType").value = state.discountType;
        document.getElementById("executionDays").value = state.executionDays;
        document.getElementById("validityDays").value = state.validityDays;
        document.getElementById("pageTitle").textContent = state.projectName || "عرض سعر";

        renderAll();
      }

      async function loadSavedList() {
        const el = document.getElementById("savedList");
        document.getElementById("savedListTitle").textContent = isOwnerOrAdmin ? "كل عروض الفريق" : "عروضي المحفوظة";
        try {
          const { quotes } = await api("/quotes");
          if (!quotes.length) {
            el.innerHTML = '<p class="empty-note">ما في عروض محفوظة بعد.</p>';
            return;
          }
          el.innerHTML = quotes.map(q => `
            <div class="saved-item" data-id="${q.id}">
              <div class="info">
                <div class="name">${escapeAttr(q.project_name)}${q.reference_no ? ' · <span style="color:var(--gold);font-weight:400;">' + escapeAttr(q.reference_no) + '</span>' : ''}${q.designer_name ? ' · <span style="color:var(--ash);font-weight:400;">' + escapeAttr(q.designer_name) + '</span>' : ''}</div>
                <div class="meta">${new Date(q.updated_at).toLocaleDateString("ar-JO")} · ${moneyInt(q.total)}</div>
              </div>
              <div class="btns"><button class="load-btn">فتح</button><button class="del-q-btn">حذف</button></div>
            </div>
          `).join("");
          el.querySelectorAll(".saved-item").forEach(row => {
            const id = row.getAttribute("data-id");
            row.querySelector(".load-btn").onclick = () => loadQuote(id).then(() => showToast("تم فتح العرض")).catch(e => showToast(e.message));
            row.querySelector(".del-q-btn").onclick = async () => {
              try {
                await api("/quotes/" + id, { method: "DELETE" });
                loadSavedList();
                if (currentQuoteId == id) document.getElementById("newQuoteBtn")?.click() || resetQuote();
              } catch (e) { showToast(e.message); }
            };
          });
        } catch { el.innerHTML = '<p class="empty-note">تعذر تحميل العروض.</p>'; }
      }

      function resetQuote() {
        currentQuoteId = null;
        state = {
          projectName: "", referenceNo: "", clientName: "", siteLocation: "",
          taxPct: 16, discountVal: 0, discountType: "fixed",
          executionDays: 45, validityDays: 30,
          paymentTerms: [
            { percentage: 60, trigger_description: "عند توقيع العقد" },
            { percentage: 30, trigger_description: "عند إنجاز 70%" },
            { percentage: 10, trigger_description: "عند التسليم النهائي" },
          ],
        };
        sections = [];
        activeSectionIdx = 0;
        activeCategoryTab = null;
        document.getElementById("projectName").value = "";
        document.getElementById("referenceNo").value = "";
        document.getElementById("clientName").value = "";
        document.getElementById("siteLocation").value = "";
        document.getElementById("taxPct").value = 16;
        document.getElementById("discountVal").value = 0;
        document.getElementById("discountType").value = "fixed";
        document.getElementById("executionDays").value = 45;
        document.getElementById("validityDays").value = 30;
        document.getElementById("pageTitle").textContent = "عرض سعر جديد";
        renderAll();
        showToast("عرض جديد — جاهز تبدأ فيه");
      }

      function showToast(msg) {
        const t = document.getElementById("saveToast");
        t.textContent = msg; t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 1800);
      }

      // ---- Button Events ----
      document.getElementById("saveQuoteBtn").onclick = saveQuote;
      document.getElementById("printBtn").onclick = () => window.print();
      document.getElementById("exportPdfBtn").onclick = () => {
        if (!currentQuoteId) { showToast("لازم تحفظ العرض أولاً"); return; }
        window.open(`/api/quotes/${currentQuoteId}/pdf?token=${token}`, "_blank");
      };
      document.getElementById("saveTemplateBtn").onclick = () => openTemplateModal("save");
      document.getElementById("loadTemplateBtn").onclick = () => openTemplateModal("load");
      document.getElementById("logoutBtn").onclick = () => {
        localStorage.removeItem("token"); localStorage.removeItem("user");
        window.location.href = "/index.html";
      };

      // ---- Init ----
      (async function init() {
        document.getElementById("userName").textContent = currentUser.name;
        document.getElementById("roleBadge").textContent =
          currentUser.role === "admin" ? "مدير" : currentUser.role === "owner" ? "مالك" : "مصمم";
        if (isOwnerOrAdmin) document.getElementById("adminLink").style.display = "inline-block";
        if (currentUser.avatar) {
          document.getElementById("topbarAvatarImg").src = currentUser.avatar;
          document.getElementById("topbarAvatarImg").style.display = "block";
          document.getElementById("topbarAvatarCircle").querySelector(".topbar-avatar-placeholder").style.display = "none";
        }
        renderAll();
        loadSavedList();
        await loadPickerCategories();
      })();
    </script>
  </body>
</html>
