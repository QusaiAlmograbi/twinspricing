<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>لوحة تسعير مشاريع التصميم الداخلي</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=Cairo:wght@400;500;600;700;800&display=swap");

      :root {
        --bg: #0c0c0c;
        --surface: #161616;
        --surface-raised: #1e1e1e;
        --champagne: #e8dcc8;
        --ash: #7a756e;
        --pewter: #2c2c2c;
        --gold: #c9a84c;
        --gold-dim: #a88a3a;
        --gold-glow: rgba(201, 168, 76, 0.1);
        --gold-glow-strong: rgba(201, 168, 76, 0.18);
        --danger: #d4605a;
        --danger-tint: rgba(212, 96, 90, 0.1);
        --success: #5a9e6f;
        --success-tint: rgba(90, 158, 111, 0.1);
        --radius: 12px;
      }
      [data-theme="light"] {
        --bg: #f5f2ed;
        --surface: #ffffff;
        --surface-raised: #f0ede8;
        --champagne: #1c1a17;
        --ash: #7a756e;
        --pewter: #ddd8d0;
        --gold: #9a7b2f;
        --gold-dim: #7a6125;
        --gold-glow: rgba(154, 123, 47, 0.1);
        --gold-glow-strong: rgba(154, 123, 47, 0.18);
        --danger: #c0453e;
        --danger-tint: rgba(192, 69, 62, 0.08);
        --success: #3d8b55;
        --success-tint: rgba(61, 139, 85, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        background: var(--bg);
        font-family: "DM Sans", "Cairo", "Tahoma", sans-serif;
        color: var(--champagne);
        padding: 0;
        margin: 0;
        -webkit-font-smoothing: antialiased;
      }
      .app { background: var(--bg); min-height: 100vh; padding: 16px 16px 60px; }
      .wrap { max-width: 1300px; margin: 0 auto; }

      /* Topbar */
      .topbar {
        display: flex; justify-content: space-between; align-items: center;
        flex-wrap: wrap; gap: 10px;
        background: var(--surface); border: 1px solid var(--pewter);
        border-radius: 14px; padding: 10px 16px; margin-bottom: 14px;
      }
      .topbar .who { font-size: 13px; color: var(--ash); display: flex; align-items: center; gap: 8px; }
      .topbar .who b { color: var(--champagne); }
      .topbar .role-badge {
        display: inline-block; font-size: 11px; font-weight: 700;
        padding: 2px 9px; border-radius: 999px;
        background: var(--gold-glow-strong); color: var(--gold);
      }
      .topbar-avatar-circle {
        display: inline-flex; align-items: center; justify-content: center;
        width: 30px; height: 30px; border-radius: 50%; overflow: hidden;
        background: var(--surface-raised); border: 2px solid var(--pewter); flex-shrink: 0;
      }
      .topbar-avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
      .topbar-avatar-placeholder { font-size: 14px; opacity: 0.6; }
      .topbar .links { display: flex; gap: 8px; align-items: center; }
      .topbar .links a {
        font-family: inherit; font-size: 12.5px; font-weight: 600;
        color: var(--ash); text-decoration: none; padding: 5px 12px;
        border-radius: 8px; transition: color 0.2s;
      }
      .topbar .links a:hover { color: var(--gold); }
      .topbar .logout-btn {
        background: none; border: 1px solid var(--pewter); color: var(--ash);
        padding: 5px 12px; border-radius: 8px; cursor: pointer;
        font-family: inherit; font-size: 12.5px; transition: 0.2s;
      }
      .topbar .logout-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

      /* Project Header */
      .project-header {
        background: var(--surface); border: 1px solid var(--pewter);
        border-radius: 14px; padding: 18px 20px; margin-bottom: 14px;
        position: relative; overflow: hidden;
      }
      .project-header::before {
        content: ""; position: absolute; top: 0; right: 0; bottom: 0;
        width: 4px; background: var(--gold);
      }
      .project-header .eyebrow {
        color: var(--gold); letter-spacing: 0.1em;
        font-size: 10.5px; font-weight: 600; margin-bottom: 4px;
      }
      .project-header h1 {
        font-family: "Cormorant Garamond", "Cairo", serif;
        font-size: 22px; font-weight: 600; color: var(--champagne);
        margin: 0 0 12px;
      }
      .project-fields {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 10px;
      }
      .project-fields label {
        font-size: 11.5px; color: var(--ash); font-weight: 600;
        display: flex; flex-direction: column; gap: 4px;
      }
      .project-fields input {
        font-family: inherit; font-size: 13.5px; padding: 7px 10px;
        border: 1px solid var(--pewter); border-radius: 7px;
        background: var(--surface-raised); color: var(--champagne);
      }

      /* Sections Nav */
      .sections-nav {
        display: flex; gap: 8px; overflow-x: auto;
        padding: 4px 2px 12px; margin-bottom: 4px;
      }
      .section-tab {
        flex: 0 0 auto; display: flex; align-items: center; gap: 6px;
        padding: 8px 14px; border-radius: 999px; cursor: pointer;
        background: var(--surface); border: 1px solid var(--pewter);
        color: var(--ash); font-size: 13px; font-weight: 600;
        white-space: nowrap; transition: 0.15s;
      }
      .section-tab.active {
        background: var(--champagne); color: var(--bg); border-color: var(--champagne);
      }
      .section-tab .count { font-size: 11px; opacity: 0.7; }
      .add-section-btn {
        flex: 0 0 auto; display: flex; align-items: center; gap: 4px;
        padding: 8px 14px; border-radius: 999px; cursor: pointer;
        background: transparent; border: 1px dashed var(--pewter);
        color: var(--gold-dim); font-size: 13px; font-weight: 700;
        font-family: inherit; white-space: nowrap; transition: 0.15s;
      }
      .add-section-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

      /* Layout */
      .layout { display: flex; gap: 16px; align-items: flex-start; }
      .main { flex: 1 1 auto; min-width: 0; }
      .sidebar {
        flex: 0 0 320px; position: sticky; top: 16px;
        background: var(--surface); border: 1px solid var(--pewter);
        border-radius: 14px; padding: 18px; max-height: calc(100vh - 32px);
        overflow-y: auto;
      }

      /* Section Panel */
      .section-panel {
        background: var(--surface); border: 1px solid var(--pewter);
        border-radius: 14px; padding: 18px 20px; margin-bottom: 14px;
      }
      .section-panel h2 {
        font-family: "Cormorant Garamond", "Cairo", serif;
        font-size: 20px; margin: 0 0 4px; color: var(--champagne);
        display: flex; align-items: center; gap: 8px;
      }
      .section-panel h2 .sec-code {
        background: var(--gold-glow-strong); color: var(--gold);
        padding: 2px 8px; border-radius: 6px; font-size: 13px; font-weight: 700;
      }
      .section-sub { color: var(--ash); font-size: 12.5px; margin: 0 0 12px; }
      .section-actions { display: flex; gap: 6px; margin-bottom: 12px; }
      .section-actions button {
        font-family: inherit; font-size: 11.5px; font-weight: 600;
        padding: 5px 10px; border-radius: 6px; cursor: pointer; border: none;
      }
      .btn-rename { background: var(--surface-raised); border: 1px solid var(--pewter) !important; color: var(--ash); }
      .btn-rename:hover { border-color: var(--gold-dim) !important; color: var(--gold); }
      .btn-delete-sec { background: var(--danger-tint); color: var(--danger); }
      .btn-delete-sec:hover { opacity: 0.8; }

      /* Items Table */
      table.items { width: 100%; border-collapse: collapse; font-size: 13px; }
      table.items th {
        text-align: right; font-weight: 600; color: var(--ash);
        font-size: 11.5px; border-bottom: 1px solid var(--pewter); padding: 0 4px 6px;
      }
      table.items td {
        padding: 4px; border-bottom: 1px solid var(--pewter); vertical-align: middle;
      }
      table.items input, table.items select {
        width: 100%; font-family: inherit; font-size: 13px;
        padding: 6px 7px; border: 1px solid var(--pewter); border-radius: 6px;
        background: var(--surface-raised); color: var(--champagne);
      }
      table.items input[type="number"] { text-align: center; }
      table.items .f-qty::-webkit-inner-spin-button,
      table.items .f-qty::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
      table.items .f-qty { -moz-appearance: textfield; }
      .col-code { width: 5%; text-align: center; font-weight: 600; color: var(--gold); font-size: 12px; }
      .col-name { width: 18%; }
      .col-desc { width: 14%; }
      .col-img { width: 40px; text-align: center; }
      .col-unit { width: 8%; }
      .col-qty { width: 11%; }
      .col-price { width: 10%; }
      .col-total { width: 10%; font-weight: 700; text-align: left; padding-left: 4px; white-space: nowrap; color: var(--champagne); }
      .col-notes { width: 10%; }
      .col-del { width: 30px; text-align: center; }
      .del-btn {
        border: none; background: var(--danger); color: #fff;
        cursor: pointer; font-size: 14px; line-height: 1;
        padding: 3px 7px; border-radius: 5px;
      }
      .del-btn:hover { opacity: 0.85; }

      /* Cost fields (admin/owner only) */
      .cost-fields { display: flex; gap: 6px; align-items: center; }
      .cost-fields input { width: 70px; text-align: center; }
      .cost-fields .pct-badge {
        font-size: 10px; color: var(--gold); font-weight: 700;
        background: var(--gold-glow); padding: 2px 5px; border-radius: 4px;
      }

      .add-item-btn {
        margin-top: 10px; display: flex; align-items: center; gap: 6px;
        background: transparent; border: 1px dashed var(--pewter);
        color: var(--gold-dim); font-family: inherit; font-weight: 700;
        font-size: 13px; padding: 8px 14px; border-radius: 8px;
        cursor: pointer; width: 100%; justify-content: center; transition: 0.2s;
      }
      .add-item-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
      .section-subtotal {
        margin-top: 10px; text-align: left; font-size: 13px;
        font-weight: 700; color: var(--gold); padding-top: 8px;
        border-top: 1px solid var(--pewter);
      }

      /* Sidebar */
      .sidebar h2 {
        font-family: "Cormorant Garamond", "Cairo", serif;
        font-size: 20px; margin: 0 0 12px; color: var(--champagne);
      }
      .sidebar-sections { margin-bottom: 14px; }
      .sidebar-sec-row {
        display: flex; justify-content: space-between; padding: 5px 0;
        border-bottom: 1px dotted var(--pewter); font-size: 12.5px; color: var(--ash);
      }
      .sidebar-sec-row .n { color: var(--champagne); font-weight: 600; }

      .settings { margin: 12px 0; display: flex; flex-direction: column; gap: 8px; }
      .settings label {
        font-size: 12px; color: var(--ash); font-weight: 600;
        display: flex; flex-direction: column; gap: 4px;
      }
      .settings input, .settings select {
        font-family: inherit; font-size: 13px; padding: 7px 9px;
        border: 1px solid var(--pewter); border-radius: 6px;
        background: var(--surface-raised); color: var(--champagne);
      }
      .discount-row { display: flex; gap: 5px; }
      .discount-row input { flex: 1; }
      .discount-row select { width: 65px; }

      .totals-breakdown { margin-top: 12px; border-top: 1px solid var(--pewter); padding-top: 10px; font-size: 13px; }
      .tb-row { display: flex; justify-content: space-between; padding: 4px 0; color: var(--ash); }
      .tb-row .n { color: var(--champagne); font-weight: 600; }
      .tb-row.highlight { color: var(--gold); font-weight: 700; }

      .grand-total {
        margin-top: 10px; background: var(--gold); color: var(--bg);
        border-radius: 10px; padding: 14px 16px;
        display: flex; justify-content: space-between; align-items: baseline;
      }
      .grand-total .label { font-size: 12.5px; opacity: 0.85; font-weight: 600; }
      .grand-total .value { font-size: 22px; font-weight: 700; }

      /* Payment Terms */
      .payment-section { margin-top: 14px; border-top: 1px solid var(--pewter); padding-top: 12px; }
      .payment-section h3 { font-size: 13px; color: var(--ash); margin: 0 0 8px; font-weight: 700; }
      .payment-row {
        display: flex; gap: 6px; align-items: center; margin-bottom: 6px;
        font-size: 12px;
      }
      .payment-row input {
        font-family: inherit; font-size: 12px; padding: 5px 7px;
        border: 1px solid var(--pewter); border-radius: 5px;
        background: var(--surface-raised); color: var(--champagne);
      }
      .payment-row .pct-input { width: 45px; text-align: center; }
      .payment-row .desc-input { flex: 1; }
      .payment-row .amt { font-weight: 700; color: var(--champagne); white-space: nowrap; font-size: 11px; }

      .meta-row { display: flex; gap: 8px; margin-top: 8px; }
      .meta-row label { font-size: 11.5px; color: var(--ash); font-weight: 600; display: flex; flex-direction: column; gap: 3px; flex: 1; }
      .meta-row input {
        font-family: inherit; font-size: 12px; padding: 5px 7px;
        border: 1px solid var(--pewter); border-radius: 5px;
        background: var(--surface-raised); color: var(--champagne);
      }

      /* Actions */
      .actions { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
      .actions button {
        flex: 1; font-family: inherit; font-weight: 700; font-size: 12.5px;
        padding: 9px 6px; border-radius: 8px; cursor: pointer; border: none;
        min-width: 80px;
      }
      .btn-save { background: var(--gold); color: var(--bg); }
      .btn-save:hover { background: var(--gold-dim); }
      .btn-save:disabled { opacity: 0.6; cursor: default; }
      .btn-secondary { background: none; border: 1px solid var(--pewter) !important; color: var(--ash); }
      .btn-secondary:hover { border-color: var(--gold-dim) !important; color: var(--gold); }

      /* Saved Quotes */
      .saved-quotes { margin-top: 16px; border-top: 1px solid var(--pewter); padding-top: 12px; }
      .saved-quotes h3 { font-size: 12.5px; color: var(--ash); margin: 0 0 8px; font-weight: 700; }
      .saved-item {
        display: flex; justify-content: space-between; align-items: center;
        gap: 6px; padding: 7px 0; border-bottom: 1px dotted var(--pewter); font-size: 12.5px;
      }
      .saved-item .info { min-width: 0; }
      .saved-item .name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--champagne); }
      .saved-item .meta { color: var(--ash); font-size: 11px; }
      .saved-item .btns { display: flex; gap: 3px; flex: 0 0 auto; }
      .saved-item .btns button {
        border: 1px solid var(--pewter); background: var(--surface);
        border-radius: 5px; padding: 3px 7px; font-family: inherit;
        font-size: 11px; cursor: pointer; color: var(--ash); transition: 0.2s;
      }
      .saved-item .btns button:hover { color: var(--gold); border-color: var(--gold-dim); }
      .empty-note { color: var(--ash); font-size: 12px; }

      /* Image */
      .item-img-btn {
        width: 32px; height: 32px; border: 1px dashed var(--pewter);
        border-radius: 6px; background: transparent; color: var(--ash);
        cursor: pointer; display: inline-flex; align-items: center;
        justify-content: center; font-size: 16px; padding: 0; transition: 0.15s;
      }
      .item-img-btn:hover { background: var(--gold-glow); color: var(--gold); border-color: var(--gold-dim); }
      .item-thumb-wrap {
        position: relative; display: inline-block; width: 32px; height: 32px;
        border-radius: 6px; overflow: hidden; cursor: pointer; border: 1px solid var(--pewter);
      }
      .item-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .item-thumb-rm {
        position: absolute; top: 1px; left: 1px; width: 14px; height: 14px;
        border-radius: 50%; background: var(--danger); color: #fff;
        border: none; cursor: pointer; font-size: 9px; line-height: 1;
        display: flex; align-items: center; justify-content: center;
        padding: 0; opacity: 0; transition: opacity 0.15s;
      }
      .item-thumb-wrap:hover .item-thumb-rm { opacity: 1; }
      .item-img-input { display: none; }

      .lightbox-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.9);
        z-index: 1000; display: flex; align-items: center; justify-content: center;
        cursor: pointer; opacity: 0; pointer-events: none; transition: opacity 0.2s;
      }
      .lightbox-overlay.open { opacity: 1; pointer-events: auto; }
      .lightbox-overlay img {
        max-width: 90vw; max-height: 90vh; border-radius: 10px;
        box-shadow: 0 8px 40px rgba(0,0,0,0.5); cursor: default;
      }
      .lightbox-close {
        position: absolute; top: 20px; left: 20px; width: 36px; height: 36px;
        border-radius: 50%; background: rgba(255,255,255,0.15);
        color: var(--champagne); border: none; font-size: 20px;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
      }
      .lightbox-close:hover { background: rgba(255,255,255,0.3); }

      .save-toast {
        position: fixed; bottom: 20px; left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--gold); color: var(--bg);
        padding: 9px 18px; border-radius: 999px; font-size: 13px; font-weight: 600;
        opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 50;
      }
      .save-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      .theme-toggle {
        position: fixed; top: 14px; left: 14px; width: 34px; height: 34px;
        border-radius: 50%; border: 1px solid var(--pewter); background: var(--surface);
        color: var(--ash); font-size: 15px; cursor: pointer;
        display: flex; align-items: center; justify-content: center; z-index: 100;
      }
      .theme-toggle:hover { color: var(--gold); border-color: var(--gold-dim); }

      /* Modal */
      .modal-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.7);
        z-index: 1000; display: flex; align-items: center; justify-content: center;
        opacity: 0; pointer-events: none; transition: opacity 0.2s;
      }
      .modal-overlay.open { opacity: 1; pointer-events: auto; }
      .modal {
        background: var(--surface); border: 1px solid var(--pewter);
        border-radius: 14px; padding: 22px; width: 90%; max-width: 480px;
        max-height: 80vh; overflow-y: auto;
      }
      .modal h3 { margin: 0 0 14px; font-family: "Cormorant Garamond", "Cairo", serif; font-size: 18px; color: var(--champagne); }
      .modal label { font-size: 12.5px; color: var(--ash); font-weight: 600; display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
      .modal input, .modal select, .modal textarea {
        font-family: inherit; font-size: 13px; padding: 7px 10px;
        border: 1px solid var(--pewter); border-radius: 7px;
        background: var(--surface-raised); color: var(--champagne); width: 100%;
      }
      .modal textarea { min-height: 60px; resize: vertical; }
      .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
      .modal-actions button {
        flex: 1; font-family: inherit; font-weight: 700; font-size: 13px;
        padding: 9px; border-radius: 8px; cursor: pointer; border: none;
      }

      /* Catalog Picker */
      .picker-modal {
        max-width: 600px;
      }
      .picker-categories {
        display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
      }
      .picker-cat-btn {
        font-family: inherit; font-size: 12px; font-weight: 600;
        padding: 6px 12px; border-radius: 999px; cursor: pointer;
        background: var(--surface-raised); border: 1px solid var(--pewter);
        color: var(--ash); transition: 0.15s;
      }
      .picker-cat-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
      .picker-cat-btn.active {
        background: var(--gold-glow-strong); border-color: var(--gold); color: var(--gold);
      }
      .picker-search {
        font-family: inherit; font-size: 13px; padding: 8px 12px;
        border: 1px solid var(--pewter); border-radius: 8px;
        background: var(--surface-raised); color: var(--champagne);
        width: 100%; margin-bottom: 10px;
      }
      .picker-results {
        max-height: 300px; overflow-y: auto;
      }
      .picker-item {
        display: flex; justify-content: space-between; align-items: center;
        padding: 10px 12px; border-radius: 8px; cursor: pointer;
        border: 1px solid transparent; transition: 0.12s;
      }
      .picker-item:hover { background: var(--gold-glow); border-color: var(--gold-dim); }
      .picker-item .pi-info { min-width: 0; }
      .picker-item .pi-code { font-size: 11px; color: var(--gold); font-weight: 600; }
      .picker-item .pi-name { font-size: 13px; font-weight: 600; color: var(--champagne); }
      .picker-item .pi-desc { font-size: 11.5px; color: var(--ash); }
      .picker-item .pi-meta { font-size: 11px; color: var(--ash); white-space: nowrap; margin-right: 10px; }
      .picker-item .pi-price { font-size: 13px; font-weight: 700; color: var(--gold); white-space: nowrap; }
      .picker-empty { text-align: center; color: var(--ash); font-size: 12.5px; padding: 30px 0; }

      /* Pick from Catalog button */
      .pick-catalog-btn {
        margin-top: 10px; display: flex; align-items: center; gap: 6px;
        background: var(--gold-glow); border: 1px solid var(--gold-dim);
        color: var(--gold); font-family: inherit; font-weight: 700;
        font-size: 13px; padding: 8px 14px; border-radius: 8px;
        cursor: pointer; width: 100%; justify-content: center; transition: 0.2s;
      }
      .pick-catalog-btn:hover { background: var(--gold-glow-strong); border-color: var(--gold); }

      /* Quick-add Category Buttons */
      .quick-add-cats {
        display: flex; gap: 6px; flex-wrap: wrap;
        margin-top: 10px;
      }
      .quick-add-cats-label {
        font-size: 11.5px; font-weight: 600; color: var(--ash);
        display: flex; align-items: center; gap: 4px;
        white-space: nowrap; user-select: none;
      }
      .quick-add-cat-btn {
        flex: 0 0 auto; display: inline-flex; align-items: center; gap: 4px;

      /* Category Sub-tabs */

      .cat-search-row {

      .cat-search-input {
        flex: 1; font-family: inherit; font-size: 13px; padding: 10px 12px;

      .cat-search-clear {
        position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
        background: none; border: none; color: var(--ash); cursor: pointer;

      .cat-search-clear:hover { color: var(--gold); background: var(--gold-glow); }

      .cat-search-results {
