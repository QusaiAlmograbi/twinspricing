<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>تسجيل الدخول — لوحة تسعير التصميم الداخلي</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=Cairo:wght@400;500;600;700;800&display=swap");
      :root {
        --bg: #0C0C0C;
        --surface: #161616;
        --surface-raised: #1E1E1E;
        --champagne: #E8DCC8;
        --ash: #7A756E;
        --pewter: #2C2C2C;
        --gold: #C9A84C;
        --gold-dim: #A88A3A;
        --gold-glow: rgba(201, 168, 76, 0.10);
        --gold-glow-strong: rgba(201, 168, 76, 0.18);
        --danger: #D4605A;
        --danger-tint: rgba(212, 96, 90, 0.10);
        --success: #5A9E6F;
        --success-tint: rgba(90, 158, 111, 0.10);
        --radius: 12px;
      }
      [data-theme="light"] {
        --bg: #F5F2ED;
        --surface: #FFFFFF;
        --surface-raised: #F0EDE8;
        --champagne: #1C1A17;
        --ash: #7A756E;
        --pewter: #DDD8D0;
        --gold: #9A7B2F;
        --gold-dim: #7A6125;
        --gold-glow: rgba(154, 123, 47, 0.10);
        --gold-glow-strong: rgba(154, 123, 47, 0.18);
        --danger: #C0453E;
        --danger-tint: rgba(192, 69, 62, 0.08);
        --success: #3D8B55;
        --success-tint: rgba(61, 139, 85, 0.08);
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; }
      html { scroll-behavior: smooth; }
      @keyframes rise {
        from { opacity: 0; transform: translateY(14px); }
        to { opacity: 1; transform: translateY(0); }
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        font-family: "DM Sans", "Cairo", "Tahoma", sans-serif;
        color: var(--champagne);
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }
      .page-shell {
        width: min(100%, 420px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
        animation: rise 0.6s ease-out both;
      }
      .hero-banner {
        width: 100%;
        display: flex;
        justify-content: center;
        animation: rise 0.6s ease-out 0.1s both;
      }
      .hero-banner img {
        width: min(300px, 82vw);
        max-width: 100%;
        height: auto;
        object-fit: contain;
        display: block;
      }
      .card {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--pewter);
        border-radius: var(--radius);
        padding: 36px 32px;
        position: relative;
        overflow: hidden;
        animation: rise 0.6s ease-out 0.2s both;
      }
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 4px;
        background: var(--gold);
      }
      .eyebrow {
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--gold);
        font-weight: 600;
        margin-bottom: 8px;
      }
      h1 {
        font-family: "Cormorant Garamond", "Cairo", serif;
        font-size: 30px;
        font-weight: 600;
        color: var(--champagne);
        margin: 0 0 28px;
        line-height: 1.2;
      }
      label {
        font-size: 12px;
        font-weight: 500;
        color: var(--ash);
        display: block;
        margin: 0 0 6px;
        letter-spacing: 0.02em;
      }
      input {
        width: 100%;
        font-family: inherit;
        font-size: 15px;
        padding: 11px 14px;
        border: 1px solid var(--pewter);
        border-radius: 8px;
        background: var(--surface-raised);
        color: var(--champagne);
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      input:focus {
        outline: none;
        border-color: var(--gold);
        box-shadow: 0 0 0 3px var(--gold-glow);
      }
      button {
        width: 100%;
        margin-top: 24px;
        font-family: inherit;
        font-weight: 600;
        font-size: 14px;
        padding: 12px;
        border-radius: 8px;
        border: none;
        background: var(--gold);
        color: var(--bg);
        cursor: pointer;
        letter-spacing: 0.02em;
        transition: background 0.2s, transform 0.1s;
      }
      button:hover { background: var(--gold-dim); }
      button:active { transform: scale(0.985); }
      button:disabled { opacity: 0.5; cursor: default; transform: none; }
      .switch {
        text-align: center;
        margin-top: 20px;
        font-size: 13px;
        color: var(--ash);
      }
      .switch a {
        color: var(--gold);
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: color 0.2s;
      }
      .switch a:hover { color: var(--champagne); }
      .error {
        background: var(--danger-tint);
        border: 1px solid var(--danger);
        color: var(--danger);
        font-size: 13px;
        padding: 10px 14px;
        border-radius: 8px;
        margin-top: 14px;
        display: none;
      }
      .success {
        background: var(--success-tint);
        border: 1px solid var(--success);
        color: var(--success);
        font-size: 13px;
        padding: 10px 14px;
        border-radius: 8px;
        margin-top: 14px;
        display: none;
      }
      .hint {
        font-size: 12px;
        color: var(--ash);
        margin-top: 8px;
        line-height: 1.6;
      }
      @media (max-width: 640px) {
        body { padding: 16px; }
        .page-shell { gap: 24px; }
        .hero-banner img { width: min(240px, 88vw); }
        .card { padding: 28px 22px; }
      }
      .theme-toggle {
        position: fixed;
        top: 16px;
        left: 16px;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid var(--pewter);
        background: var(--surface);
        color: var(--ash);
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s, border-color 0.2s;
        z-index: 100;
      }
      .theme-toggle:hover {
        color: var(--gold);
        border-color: var(--gold-dim);
      }
    </style>
  </head>
  <body>
    <button class="theme-toggle" id="themeToggle" aria-label="تبديل السمة">☀</button>
    <div class="page-shell">
      <div class="hero-banner" aria-label="شعار TWiNS Interior Design">
        <img src="/logo.svg" alt="شعار TWiNS Interior Design" />
      </div>
      <div class="card">
        <div class="eyebrow">TWiNS Interior Design</div>
        <h1 id="formTitle">تسجيل الدخول</h1>
        <form id="authForm">
          <div id="nameField" style="display: none">
            <label for="name">الاسم</label>
            <input id="name" type="text" placeholder="الاسم الكامل" />
          </div>
          <label for="email">الإيميل</label>
          <input
            id="email"
            type="email"
            placeholder="name@company.com"
            required
          />
          <label for="password">كلمة المرور</label>
          <input
            id="password"
            type="password"
            placeholder="6 أحرف على الأقل"
            required
          />
          <div class="hint" id="registerHint" style="display: none"></div>
          <button type="submit" id="submitBtn">دخول</button>
          <div class="error" id="errorBox"></div>
          <div class="success" id="successBox"></div>
        </form>
        <div class="switch">
          <span id="switchText">أول مرة تستخدم الأداة؟</span>
          <a id="switchLink">أنشئ حساب</a>
        </div>
      </div>
    </div>

    <script>
      // Theme toggle
      const savedTheme = localStorage.getItem("theme") || "dark";
      document.documentElement.setAttribute("data-theme", savedTheme);
      const themeBtn = document.getElementById("themeToggle");
      themeBtn.textContent = savedTheme === "dark" ? "☀" : "☾";
      themeBtn.onclick = () => {
        const current = document.documentElement.getAttribute("data-theme");
        const next = current === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
        themeBtn.textContent = next === "dark" ? "☀" : "☾";
      };

      let mode = "login";
      const form = document.getElementById("authForm");
      const errorBox = document.getElementById("errorBox");
      const successBox = document.getElementById("successBox");
      const nameField = document.getElementById("nameField");
      const registerHint = document.getElementById("registerHint");

      // إذا في جلسة مسجلة مسبقاً، حوّل مباشرة للأداة
      if (localStorage.getItem("token")) window.location.href = "/app";

      document.getElementById("switchLink").onclick = () => {
        mode = mode === "login" ? "register" : "login";
        document.getElementById("formTitle").textContent =
          mode === "login" ? "تسجيل الدخول" : "إنشاء حساب جديد";
        document.getElementById("submitBtn").textContent =
          mode === "login" ? "دخول" : "إنشاء الحساب";
        document.getElementById("switchText").textContent =
          mode === "login" ? "أول مرة تستخدم الأداة؟" : "عندك حساب مسبقاً؟";
        document.getElementById("switchLink").textContent =
          mode === "login" ? "أنشئ حساب" : "سجّل الدخول";
        nameField.style.display = mode === "register" ? "block" : "none";
        registerHint.style.display = mode === "register" ? "block" : "none";
        errorBox.style.display = "none";
        successBox.style.display = "none";
      };

      form.onsubmit = async (e) => {
        e.preventDefault();
        errorBox.style.display = "none";
        successBox.style.display = "none";
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = true;
        const payload = {
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        };
        if (mode === "register")
          payload.name = document.getElementById("name").value;

        try {
          const res = await fetch("/api/auth/" + mode, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok)
            throw new Error(data.error || "صار في خطأ، حاول مرة ثانية");

          if (data.pending) {
            successBox.textContent = data.message;
            successBox.style.display = "block";
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";
            document.getElementById("name").value = "";
            return;
          }

          localStorage.setItem("token", data.token);
          localStorage.setItem("user", JSON.stringify(data.user));
          window.location.href = "/app";
        } catch (err) {
          errorBox.textContent = err.message;
          errorBox.style.display = "block";
        } finally {
          submitBtn.disabled = false;
        }
      };
    </script>
  </body>
</html>
