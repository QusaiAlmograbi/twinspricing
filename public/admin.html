<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>إدارة الفريق — لوحة تسعير التصميم الداخلي</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Markazi+Text:wght@600;700&display=swap");
      :root {
        --bg: #f4f2ed;
        --paper: #ffffff;
        --ink: #211d17;
        --ink-soft: #726c63;
        --line: #e5e1d6;
        --line-strong: #d3cbb8;
        --pine: #8a6512;
        --pine-dark: #6b4e0c;
        --brass: #cc9a06;
        --brass-tint: #fbefc7;
        --danger: #a33b2d;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Cairo", "Tahoma", sans-serif;
        background: var(--bg);
        color: var(--ink);
        padding: 20px;
      }
      .wrap {
        max-width: 820px;
        margin: 0 auto;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .topbar a {
        font-size: 13px;
        font-weight: 700;
        color: var(--pine-dark);
        text-decoration: none;
        border: 1px solid var(--line-strong);
        padding: 7px 14px;
        border-radius: 8px;
        background: var(--paper);
      }
      .card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 26px 28px;
        position: relative;
        overflow: hidden;
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 6px;
        background: repeating-linear-gradient(
          90deg,
          var(--pine) 0 28px,
          var(--brass) 28px 56px
        );
      }
      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.1em;
        color: var(--pine-dark);
        font-weight: 700;
        margin: 8px 0 4px;
      }
      h1 {
        font-family: "Markazi Text", serif;
        font-size: 30px;
        margin: 0 0 6px;
      }
      p.sub {
        color: var(--ink-soft);
        font-size: 14px;
        margin: 0 0 22px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      th {
        text-align: right;
        font-weight: 600;
        color: var(--ink-soft);
        font-size: 12.5px;
        border-bottom: 1px solid var(--line-strong);
        padding: 0 8px 10px;
      }
      td {
        padding: 10px 8px;
        border-bottom: 1px solid var(--line);
      }
      .role-pill {
        font-size: 11.5px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 999px;
        background: var(--brass-tint);
        color: #6b4f16;
      }
      select {
        font-family: inherit;
        font-size: 13px;
        padding: 6px 8px;
        border: 1px solid var(--line-strong);
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
      }
      .msg {
        margin-top: 16px;
        font-size: 13px;
        padding: 8px 12px;
        border-radius: 8px;
        display: none;
      }
      .msg.ok {
        background: #eaf3de;
        color: #3b6d11;
      }
      .msg.err {
        background: #fbeae7;
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <a href="/app">→ رجوع لأداة التسعير</a>
      </div>
      <div class="card">
        <div class="eyebrow">TWiNS Interior Design · للمدير فقط</div>
        <h1>إدارة الفريق</h1>
        <p class="sub">
          حدد صلاحية كل عضو — "مدير" يشوف ويعدّل كل عروض الفريق، و"مصمم" يشوف
          عروضه هو بس.
        </p>
        <table>
          <thead>
            <tr>
              <th>الاسم</th>
              <th>الإيميل</th>
              <th>الصلاحية</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr>
              <td colspan="3">جاري التحميل...</td>
            </tr>
          </tbody>
        </table>
        <div class="msg" id="msgBox"></div>
      </div>
    </div>

    <script>
      const token = localStorage.getItem("token");
      const currentUser = JSON.parse(localStorage.getItem("user") || "null");
      if (!token || !currentUser) window.location.href = "/index.html";
      if (currentUser.role !== "admin") window.location.href = "/app";

      async function api(path, options = {}) {
        const res = await fetch("/api" + path, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token,
            ...(options.headers || {}),
          },
        });
        if (res.status === 401) {
          localStorage.clear();
          window.location.href = "/index.html";
          throw new Error();
        }
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "صار في خطأ");
        return data;
      }

      function showMsg(text, ok) {
        const box = document.getElementById("msgBox");
        box.textContent = text;
        box.className = "msg " + (ok ? "ok" : "err") + " show";
        box.style.display = "block";
        setTimeout(() => (box.style.display = "none"), 2500);
      }

      async function loadUsers() {
        const body = document.getElementById("usersBody");
        try {
          const { users } = await api("/users");
          body.innerHTML = users
            .map(
              (u) => `
      <tr data-id="${u.id}">
        <td>${u.name}</td>
        <td style="color:var(--ink-soft)">${u.email}</td>
        <td>
          <select class="role-select">
            <option value="designer" ${u.role === "designer" ? "selected" : ""}>مصمم</option>
            <option value="admin" ${u.role === "admin" ? "selected" : ""}>مدير</option>
          </select>
        </td>
      </tr>`,
            )
            .join("");
          body.querySelectorAll("tr[data-id]").forEach((tr) => {
            const id = tr.getAttribute("data-id");
            tr.querySelector(".role-select").onchange = async (e) => {
              try {
                await api("/users/" + id + "/role", {
                  method: "PATCH",
                  body: JSON.stringify({ role: e.target.value }),
                });
                showMsg("تم تحديث الصلاحية", true);
              } catch (err) {
                showMsg(err.message, false);
                loadUsers();
              }
            };
          });
        } catch (e) {
          body.innerHTML = `<tr><td colspan="3">تعذر تحميل قائمة الفريق</td></tr>`;
        }
      }
      loadUsers();
    </script>
  </body>
</html>
