<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>إدارة الفريق — لوحة تسعير التصميم الداخلي</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Markazi+Text:wght@600;700&display=swap");
      :root {
        --bg: #f4f2ed;
        --paper: #ffffff;
        --ink: #211d17;
        --ink-soft: #726c63;
        --line: #e5e1d6;
        --line-strong: #d3cbb8;
        --pine: #8a6512;
        --pine-dark: #6b4e0c;
        --brass: #cc9a06;
        --brass-tint: #fbefc7;
        --danger: #a33b2d;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Cairo", "Tahoma", sans-serif;
        background: var(--bg);
        color: var(--ink);
        padding: 20px;
      }
      .wrap {
        max-width: 820px;
        margin: 0 auto;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .topbar a {
        font-size: 13px;
        font-weight: 700;
        color: var(--pine-dark);
        text-decoration: none;
        border: 1px solid var(--line-strong);
        padding: 7px 14px;
        border-radius: 8px;
        background: var(--paper);
      }
      .card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 26px 28px;
        position: relative;
        overflow: hidden;
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 6px;
        background: repeating-linear-gradient(
          90deg,
          var(--pine) 0 28px,
          var(--brass) 28px 56px
        );
      }
      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.1em;
        color: var(--pine-dark);
        font-weight: 700;
        margin: 8px 0 4px;
      }
      h1 {
        font-family: "Markazi Text", serif;
        font-size: 30px;
        margin: 0 0 6px;
      }
      p.sub {
        color: var(--ink-soft);
        font-size: 14px;
        margin: 0 0 22px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      th {
        text-align: right;
        font-weight: 600;
        color: var(--ink-soft);
        font-size: 12.5px;
        border-bottom: 1px solid var(--line-strong);
        padding: 0 8px 10px;
      }
      td {
        padding: 10px 8px;
        border-bottom: 1px solid var(--line);
      }
      .role-pill {
        font-size: 11.5px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 999px;
        background: var(--brass-tint);
        color: #6b4f16;
      }
      select {
        font-family: inherit;
        font-size: 13px;
        padding: 6px 8px;
        border: 1px solid var(--line-strong);
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
      }
      .msg {
        margin-top: 16px;
        font-size: 13px;
        padding: 8px 12px;
        border-radius: 8px;
        display: none;
      }
      .msg.ok {
        background: #eaf3de;
        color: #3b6d11;
      }
      .msg.err {
        background: #fbeae7;
        color: var(--danger);
      }
      .access-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr 1fr auto;
        align-items: end;
        margin-bottom: 24px;
      }
      .access-grid select {
        width: 100%;
      }
      .access-actions {
        display: flex;
        justify-content: flex-end;
      }
      .access-actions button {
        font-family: inherit;
        font-weight: 700;
        font-size: 13px;
        padding: 10px 16px;
        border-radius: 10px;
        border: 1px solid var(--pine);
        color: #fff;
        background: var(--pine);
        cursor: pointer;
      }
      .access-actions button:hover {
        background: var(--pine-dark);
      }
      .access-note {
        grid-column: 1 / -1;
        font-size: 13px;
        color: var(--ink-soft);
      }
      .delete-btn {
        font-family: inherit;
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 8px;
        border: 1px solid #d3c0b0;
        background: #f8e6e3;
        color: var(--danger);
        cursor: pointer;
      }
      .delete-btn:hover {
        background: #f2d2cf;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <a href="/app">→ رجوع لأداة التسعير</a>
      </div>
      <div class="card">
        <div class="eyebrow">TWiNS Interior Design · للمدير فقط</div>
        <h1>إدارة الفريق</h1>
        <p class="sub">
          حدد صلاحية كل عضو — "مالك" و"مدير" يمكنهم إدارة الفريق ومنح صلاحية
          مشاهدة المشاريع للمصممين.
        </p>
        <section class="access-grid">
          <div>
            <label for="quoteSelect">اختر مشروع</label>
            <select id="quoteSelect"></select>
          </div>
          <div>
            <label for="designerSelect">اختر مصمم</label>
            <select id="designerSelect"></select>
          </div>
          <div class="access-actions">
            <button id="grantAccessBtn">منح وصول للمشروع</button>
          </div>
          <div class="access-note" id="accessNote"></div>
        </section>
        <table>
          <thead>
            <tr>
              <th>الاسم</th>
              <th>الإيميل</th>
              <th>الصلاحية</th>
              <th>إجراءات</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr>
              <td colspan="4">جاري التحميل...</td>
            </tr>
          </tbody>
        </table>
        <div class="msg" id="msgBox"></div>
      </div>
    </div>

    <script>
      const token = localStorage.getItem("token");
      const currentUser = JSON.parse(localStorage.getItem("user") || "null");
      if (!token || !currentUser) window.location.href = "/index.html";
      if (currentUser.role !== "admin" && currentUser.role !== "owner")
        window.location.href = "/app";

      async function api(path, options = {}) {
        const res = await fetch("/api" + path, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token,
            ...(options.headers || {}),
          },
        });
        if (res.status === 401) {
          localStorage.clear();
          window.location.href = "/index.html";
          throw new Error();
        }
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "صار في خطأ");
        return data;
      }

      function showMsg(text, ok) {
        const box = document.getElementById("msgBox");
        box.textContent = text;
        box.className = "msg " + (ok ? "ok" : "err") + " show";
        box.style.display = "block";
        setTimeout(() => (box.style.display = "none"), 2500);
      }

      async function loadUsers() {
        const body = document.getElementById("usersBody");
        try {
          const { users } = await api("/users");
          body.innerHTML = users
            .map(
              (u) => `
      <tr data-id="${u.id}">
        <td>${u.name}</td>
        <td style="color:var(--ink-soft)">${u.email}</td>
        <td>
          <select class="role-select">
            <option value="designer" ${u.role === "designer" ? "selected" : ""}>مصمم</option>
            <option value="admin" ${u.role === "admin" ? "selected" : ""}>مدير</option>
            <option value="owner" ${u.role === "owner" ? "selected" : ""}>مالك</option>
          </select>
        </td>
        <td>
          <button class="delete-btn" data-id="${u.id}">حذف المستخدم</button>
        </td>
      </tr>`,
            )
            .join("");
          body.querySelectorAll("tr[data-id]").forEach((tr) => {
            const id = tr.getAttribute("data-id");
            tr.querySelector(".role-select").onchange = async (e) => {
              try {
                await api("/users/" + id + "/role", {
                  method: "PATCH",
                  body: JSON.stringify({ role: e.target.value }),
                });
                showMsg("تم تحديث الصلاحية", true);
              } catch (err) {
                showMsg(err.message, false);
                loadUsers();
              }
            };
            const deleteBtn = tr.querySelector(".delete-btn");
            if (deleteBtn) {
              deleteBtn.onclick = async () => {
                if (!confirm("هل أنت متأكد من حذف هذا المستخدم؟")) return;
                try {
                  await api("/users/" + id, { method: "DELETE" });
                  showMsg("تم حذف المستخدم", true);
                  loadUsers();
                  loadAccessData();
                } catch (err) {
                  showMsg(err.message, false);
                }
              };
            }
          });
        } catch (e) {
          body.innerHTML = `<tr><td colspan="3">تعذر تحميل قائمة الفريق</td></tr>`;
        }
      }
      async function loadAccessData() {
        const quoteSelect = document.getElementById("quoteSelect");
        const designerSelect = document.getElementById("designerSelect");
        const accessNote = document.getElementById("accessNote");

        try {
          const [{ quotes }, { users }] = await Promise.all([
            api("/quotes"),
            api("/users"),
          ]);

          quoteSelect.innerHTML = quotes
            .map(
              (q) =>
                `<option value="${q.id}">${q.project_name} · ${new Date(
                  q.updated_at,
                ).toLocaleDateString("ar-JO")}</option>`,
            )
            .join("");
          const designers = users.filter((u) => u.role === "designer");
          designerSelect.innerHTML = designers
            .map(
              (u) => `<option value="${u.id}">${u.name} — ${u.email}</option>`,
            )
            .join("");

          accessNote.textContent = designers.length
            ? "اختر المشروع والمصمم ثم اضغط منح وصول للمشروع."
            : "لا يوجد مصممين متاحين حالياً.";
        } catch (e) {
          accessNote.textContent = "تعذر تحميل المشاريع أو المستخدمين.";
        }
      }

      document.getElementById("grantAccessBtn").onclick = async () => {
        const quoteId = document.getElementById("quoteSelect").value;
        const userId = document.getElementById("designerSelect").value;
        if (!quoteId || !userId) {
          showMsg("اختر مشروعًا ومصممًا أولاً.", false);
          return;
        }
        try {
          await api(`/quotes/${quoteId}/access`, {
            method: "POST",
            body: JSON.stringify({ user_id: Number(userId) }),
          });
          showMsg("تم منح الوصول للمشروع.", true);
        } catch (err) {
          showMsg(err.message, false);
        }
      };

      loadUsers();
      loadAccessData();
    </script>
  </body>
</html>
