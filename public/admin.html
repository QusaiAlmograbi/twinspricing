<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>إدارة الفريق — لوحة تسعير التصميم الداخلي</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Markazi+Text:wght@600;700&display=swap");
      :root {
        --bg: #f4f2ed;
        --paper: #ffffff;
        --ink: #211d17;
        --ink-soft: #726c63;
        --line: #e5e1d6;
        --line-strong: #d3cbb8;
        --pine: #8a6512;
        --pine-dark: #6b4e0c;
        --brass: #cc9a06;
        --brass-tint: #fbefc7;
        --danger: #a33b2d;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Cairo", "Tahoma", sans-serif;
        background: var(--bg);
        color: var(--ink);
        padding: 20px;
      }
      .wrap {
        max-width: 820px;
        margin: 0 auto;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px 18px;
      }
      .topbar .links {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .topbar a {
        font-size: 13px;
        font-weight: 700;
        color: var(--pine-dark);
        text-decoration: none;
        border: 1px solid var(--line-strong);
        padding: 7px 14px;
        border-radius: 8px;
        background: var(--paper);
      }
      .topbar a:hover {
        background: var(--pine-tint);
      }
      .topbar-avatar-circle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        overflow: hidden;
        background: var(--pine-tint);
        border: 2px solid var(--line-strong);
        flex-shrink: 0;
        vertical-align: middle;
      }
      .topbar-avatar-circle img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .topbar-avatar-placeholder {
        font-size: 16px;
        line-height: 1;
        opacity: 0.6;
      }
      .card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 26px 28px;
        position: relative;
        overflow: hidden;
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 6px;
        background: repeating-linear-gradient(
          90deg,
          var(--pine) 0 28px,
          var(--brass) 28px 56px
        );
      }
      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.1em;
        color: var(--pine-dark);
        font-weight: 700;
        margin: 8px 0 4px;
      }
      h1 {
        font-family: "Markazi Text", serif;
        font-size: 30px;
        margin: 0 0 6px;
      }
      p.sub {
        color: var(--ink-soft);
        font-size: 14px;
        margin: 0 0 22px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      th {
        text-align: right;
        font-weight: 600;
        color: var(--ink-soft);
        font-size: 12.5px;
        border-bottom: 1px solid var(--line-strong);
        padding: 0 8px 10px;
      }
      td {
        padding: 10px 8px;
        border-bottom: 1px solid var(--line);
      }
      .role-pill {
        font-size: 11.5px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 999px;
        background: var(--brass-tint);
        color: #6b4f16;
      }
      select {
        font-family: inherit;
        font-size: 13px;
        padding: 6px 8px;
        border: 1px solid var(--line-strong);
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
      }
      .msg {
        margin-top: 16px;
        font-size: 13px;
        padding: 8px 12px;
        border-radius: 8px;
        display: none;
      }
      .msg.ok {
        background: #eaf3de;
        color: #3b6d11;
      }
      .msg.err {
        background: #fbeae7;
        color: var(--danger);
      }
      .access-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr 1fr auto;
        align-items: end;
        margin-bottom: 24px;
      }
      .access-grid select {
        width: 100%;
      }
      .access-actions {
        display: flex;
        justify-content: flex-end;
      }
      .access-actions button {
        font-family: inherit;
        font-weight: 700;
        font-size: 13px;
        padding: 10px 16px;
        border-radius: 10px;
        border: 1px solid var(--pine);
        color: #fff;
        background: var(--pine);
        cursor: pointer;
      }
      .access-actions button:hover {
        background: var(--pine-dark);
      }
      .access-note {
        grid-column: 1 / -1;
        font-size: 13px;
        color: var(--ink-soft);
      }
      .delete-btn {
        font-family: inherit;
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 8px;
        border: 1px solid #d3c0b0;
        background: #f8e6e3;
        color: var(--danger);
        cursor: pointer;
      }
      .delete-btn:hover {
        background: #f2d2cf;
      }
      .pending-section {
        margin-bottom: 24px;
      }
      .pending-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      .pending-header h2 {
        font-family: "Markazi Text", serif;
        font-size: 20px;
        margin: 0;
      }
      .pending-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 22px;
        height: 22px;
        padding: 0 6px;
        border-radius: 999px;
        background: var(--danger);
        color: #fff;
        font-size: 12px;
        font-weight: 700;
      }
      .pending-empty {
        color: var(--ink-soft);
        font-size: 13.5px;
        padding: 8px 0;
      }
      .pending-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid var(--line);
      }
      .pending-row:last-child {
        border-bottom: none;
      }
      .pending-info {
        min-width: 0;
      }
      .pending-info .name {
        font-weight: 600;
        font-size: 14px;
      }
      .pending-info .meta {
        color: var(--ink-soft);
        font-size: 12px;
        margin-top: 2px;
      }
      .pending-actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }
      .approve-btn {
        font-family: inherit;
        font-size: 12px;
        font-weight: 700;
        padding: 6px 12px;
        border-radius: 8px;
        border: 1px solid #3b6d11;
        background: #eaf3de;
        color: #3b6d11;
        cursor: pointer;
      }
      .approve-btn:hover {
        background: #d4e8c0;
      }
      .reject-btn {
        font-family: inherit;
        font-size: 12px;
        font-weight: 700;
        padding: 6px 12px;
        border-radius: 8px;
        border: 1px solid #d3c0b0;
        background: #f8e6e3;
        color: var(--danger);
        cursor: pointer;
      }
      .reject-btn:hover {
        background: #f2d2cf;
      }
      .section-divider {
        border: none;
        border-top: 1px solid var(--line-strong);
        margin: 20px 0;
      }
      .status-pill {
        font-size: 11px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 999px;
        display: inline-block;
      }
      .status-approved {
        background: #eaf3de;
        color: #3b6d11;
      }
      .status-pending {
        background: #fff3cd;
        color: #856404;
      }
      .status-rejected {
        background: #fbeae7;
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="links">
          <a href="/profile" style="text-decoration:none; display:inline-flex; align-items:center; gap:8px;">
            <span class="topbar-avatar-circle" id="topbarAvatarCircle">
              <span class="topbar-avatar-placeholder">👤</span>
              <img id="topbarAvatarImg" src="" alt="" style="display:none" />
            </span>
            <span>الملف الشخصي</span>
          </a>
        </div>
        <div class="links">
          <a href="/app">→ رجوع لأداة التسعير</a>
        </div>
      </div>
      <div class="card">
        <div class="eyebrow">TWiNS Interior Design · للمدير فقط</div>
        <h1>إدارة الفريق</h1>
        <p class="sub">
          "المالك" فقط هو من يملك إدارة المستخدمين وتغيير الأدوار، بينما
          "المدير" يمكنه فقط منح وإزالة وصول المشاريع للمصممين.
        </p>
        <section class="access-grid">
          <div>
            <label for="quoteSelect">اختر مشروع</label>
            <select id="quoteSelect"></select>
          </div>
          <div>
            <label for="designerSelect">اختر مصمم</label>
            <select id="designerSelect"></select>
          </div>
          <div class="access-actions">
            <button id="grantAccessBtn">منح وصول للمشروع</button>
          </div>
          <div class="access-note" id="accessNote"></div>
        </section>
        <hr class="section-divider" />
        <section class="pending-section" id="pendingSection">
          <div class="pending-header">
            <h2>طلبات التسجيل</h2>
            <span class="pending-badge" id="pendingBadge" style="display:none">0</span>
          </div>
          <div id="pendingList">
            <p class="pending-empty">جاري التحميل...</p>
          </div>
        </section>
        <hr class="section-divider" />
        <table>
          <thead>
            <tr>
              <th>الاسم</th>
              <th>الإيميل</th>
              <th>الصلاحية</th>
              <th>الحالة</th>
              <th>إجراءات</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr>
              <td colspan="4">جاري التحميل...</td>
            </tr>
          </tbody>
        </table>
        <div class="msg" id="msgBox"></div>
      </div>
    </div>

    <script>
      const token = localStorage.getItem("token");
      const currentUser = JSON.parse(localStorage.getItem("user") || "null");
      if (!token || !currentUser) window.location.href = "/index.html";
      if (currentUser.role !== "admin" && currentUser.role !== "owner")
        window.location.href = "/app";

      async function api(path, options = {}) {
        const res = await fetch("/api" + path, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token,
            ...(options.headers || {}),
          },
        });
        if (res.status === 401) {
          localStorage.clear();
          window.location.href = "/index.html";
          throw new Error();
        }
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "صار في خطأ");
        return data;
      }

      function showMsg(text, ok) {
        const box = document.getElementById("msgBox");
        box.textContent = text;
        box.className = "msg " + (ok ? "ok" : "err") + " show";
        box.style.display = "block";
        setTimeout(() => (box.style.display = "none"), 2500);
      }

      async function loadUsers() {
        const body = document.getElementById("usersBody");
        try {
          const { users } = await api("/users");
          const canManageUsers = currentUser.role === "owner";
          function statusPill(s) {
            const label = s === "approved" ? "موافق" : s === "pending" ? "معلق" : "مرفوض";
            return `<span class="status-pill status-${s}">${label}</span>`;
          }
          body.innerHTML = users
            .map((u) => {
              if (canManageUsers) {
                return `
      <tr data-id="${u.id}">
        <td>${u.name}</td>
        <td style="color:var(--ink-soft)">${u.email}</td>
        <td>
          <select class="role-select">
            <option value="designer" ${u.role === "designer" ? "selected" : ""}>مصمم</option>
            <option value="admin" ${u.role === "admin" ? "selected" : ""}>مدير</option>
            <option value="owner" ${u.role === "owner" ? "selected" : ""}>مالك</option>
          </select>
        </td>
        <td>${statusPill(u.status || "approved")}</td>
        <td>
          <button class="delete-btn" data-id="${u.id}">حذف المستخدم</button>
        </td>
      </tr>`;
              }
              return `
      <tr>
        <td>${u.name}</td>
        <td style="color:var(--ink-soft)">${u.email}</td>
        <td><span class="role-pill">${u.role === "owner" ? "مالك" : u.role === "admin" ? "مدير" : "مصمم"}</span></td>
        <td>${statusPill(u.status || "approved")}</td>
        <td>غير متاح</td>
      </tr>`;
            })
            .join("");
          if (canManageUsers) {
            body.querySelectorAll("tr[data-id]").forEach((tr) => {
              const id = tr.getAttribute("data-id");
              tr.querySelector(".role-select").onchange = async (e) => {
                try {
                  await api("/users/" + id + "/role", {
                    method: "PATCH",
                    body: JSON.stringify({ role: e.target.value }),
                  });
                  showMsg("تم تحديث الصلاحية", true);
                } catch (err) {
                  showMsg(err.message, false);
                  loadUsers();
                }
              };
              const deleteBtn = tr.querySelector(".delete-btn");
              if (deleteBtn) {
                deleteBtn.onclick = async () => {
                  if (!confirm("هل أنت متأكد من حذف هذا المستخدم؟")) return;
                  try {
                    await api("/users/" + id, { method: "DELETE" });
                    showMsg("تم حذف المستخدم", true);
                    loadUsers();
                    loadAccessData();
                    loadPendingUsers();
                  } catch (err) {
                    showMsg(err.message, false);
                  }
                };
              }
            });
          }
        } catch (e) {
          body.innerHTML = `<tr><td colspan="5">تعذر تحميل قائمة الفريق</td></tr>`;
        }
      }
      async function loadAccessData() {
        const quoteSelect = document.getElementById("quoteSelect");
        const designerSelect = document.getElementById("designerSelect");
        const accessNote = document.getElementById("accessNote");

        try {
          const [{ quotes }, { users }] = await Promise.all([
            api("/quotes"),
            api("/users"),
          ]);

          quoteSelect.innerHTML = quotes
            .map(
              (q) =>
                `<option value="${q.id}">${q.project_name} · ${new Date(
                  q.updated_at,
                ).toLocaleDateString("ar-JO")}</option>`,
            )
            .join("");
          const designers = users.filter((u) => u.role === "designer");
          designerSelect.innerHTML = designers
            .map(
              (u) => `<option value="${u.id}">${u.name} — ${u.email}</option>`,
            )
            .join("");

          accessNote.textContent = designers.length
            ? "اختر المشروع والمصمم ثم اضغط منح وصول للمشروع."
            : "لا يوجد مصممين متاحين حالياً.";
        } catch (e) {
          accessNote.textContent = "تعذر تحميل المشاريع أو المستخدمين.";
        }
      }

      document.getElementById("grantAccessBtn").onclick = async () => {
        const quoteId = document.getElementById("quoteSelect").value;
        const userId = document.getElementById("designerSelect").value;
        if (!quoteId || !userId) {
          showMsg("اختر مشروعًا ومصممًا أولاً.", false);
          return;
        }
        try {
          await api(`/quotes/${quoteId}/access`, {
            method: "POST",
            body: JSON.stringify({ user_id: Number(userId) }),
          });
          showMsg("تم منح الوصول للمشروع.", true);
        } catch (err) {
          showMsg(err.message, false);
        }
      };

      loadUsers();
      loadAccessData();
      loadPendingUsers();

      if (currentUser.avatar) {
        document.getElementById("topbarAvatarImg").src = currentUser.avatar;
        document.getElementById("topbarAvatarImg").style.display = "block";
        document.getElementById("topbarAvatarCircle").querySelector(".topbar-avatar-placeholder").style.display = "none";
      }

      async function loadPendingUsers() {
        const list = document.getElementById("pendingList");
        const badge = document.getElementById("pendingBadge");
        try {
          const { users } = await api("/users/pending");
          if (!users.length) {
            list.innerHTML = '<p class="pending-empty">ما في طلبات معلقة حالياً.</p>';
            badge.style.display = "none";
            return;
          }
          badge.textContent = users.length;
          badge.style.display = "inline-flex";
          list.innerHTML = users
            .map(
              (u) => `
      <div class="pending-row" data-id="${u.id}">
        <div class="pending-info">
          <div class="name">${u.name}</div>
          <div class="meta">${u.email} · ${u.role === "admin" ? "مدير" : "مصمم"} · ${new Date(u.created_at).toLocaleDateString("ar-JO")}</div>
        </div>
        <div class="pending-actions">
          <button class="approve-btn" data-id="${u.id}">موافقة</button>
          <button class="reject-btn" data-id="${u.id}">رفض</button>
        </div>
      </div>`,
            )
            .join("");

          list.querySelectorAll(".approve-btn").forEach((btn) => {
            btn.onclick = async () => {
              const id = btn.getAttribute("data-id");
              try {
                await api("/users/" + id + "/approve", { method: "POST" });
                showMsg("تمت الموافقة على المستخدم", true);
                loadPendingUsers();
                loadUsers();
                loadAccessData();
              } catch (err) {
                showMsg(err.message, false);
              }
            };
          });

          list.querySelectorAll(".reject-btn").forEach((btn) => {
            btn.onclick = async () => {
              const id = btn.getAttribute("data-id");
              if (!confirm("هل أنت متأكد من رفض هذا الطلب؟")) return;
              try {
                await api("/users/" + id + "/reject", { method: "POST" });
                showMsg("تم رفض الطلب", true);
                loadPendingUsers();
              } catch (err) {
                showMsg(err.message, false);
              }
            };
          });
        } catch (e) {
          list.innerHTML = '<p class="pending-empty">تعذر تحميل الطلبات المعلقة.</p>';
          badge.style.display = "none";
        }
      }
    </script>
  </body>
</html>
